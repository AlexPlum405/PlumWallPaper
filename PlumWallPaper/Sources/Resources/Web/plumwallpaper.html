              <div onClick={() => setShowSavePopup(true)} className="preset-chip" style={{
                padding: '8px 0', fontSize: 11, cursor: 'pointer', color: 'var(--text-sub)', opacity: 0.6,
                borderBottom: '1px solid transparent', transition: '0.3s', letterSpacing: '0.05em', display: 'inline-block'
              }}>+ 保存当前配置</div>
            </div>

            <div style={{ display: 'flex', gap: 12, marginTop: 40 }}>
              <button className="btn" style={{ flex: 1.5, justifyContent: 'center', height: 44, fontSize: 13, background: 'var(--accent)', color: '#000', border: 'none', fontWeight: 600 }} onClick={() => {
                const filter = getCurrentFilter();
                filter.brightness = bri;

                // 标记是否为默认值（重置状态）
                filter._isDefault = hue === 0 && sat === 100 && bri === 100 && con === 100 &&
                                    blur === 0 && gray === 0 && inv === 0 && expo === 100 &&
                                    grain === 0 && vignette === 0;

                if (selectedSavedPresetId) {
                  const updated = savedPresets.map(p => p.id === selectedSavedPresetId ? { ...p, ...filter, id: p.id } : p);
                  localStorage.setItem('plum_saved_presets', JSON.stringify(updated));
                }
                onSave(filter); setView('home');
              }}>应用</button>
              <button className="btn" style={{ flex: 1, justifyContent: 'center', height: 44, fontSize: 13, background: 'transparent', border: '1px solid var(--text-sub)', color: 'var(--text-main)' }} onClick={reset}>重置</button>
            </div>
          </div>

          {presetMenu && (
            <div style={{
              position: 'fixed', top: presetMenu.y, left: presetMenu.x, width: 160,
              background: 'rgba(20,21,26,0.95)', backdropFilter: 'blur(30px)',
              borderRadius: 12, border: '1px solid rgba(255,255,255,0.1)',
              padding: 6, zIndex: 2000, boxShadow: '0 20px 40px rgba(0,0,0,0.5)',
              mixBlendMode: 'normal', animation: 'fadeIn 0.15s ease-out'
            }}>
              <div onClick={(e) => { e.stopPropagation(); setEditingPreset(presetMenu.preset); setEditName(presetMenu.preset.name); setPresetMenu(null); }} style={{
                padding: '9px 12px', borderRadius: 6, fontSize: 12, cursor: 'pointer', transition: '0.15s',
                display: 'flex', alignItems: 'center', gap: 8, color: 'rgba(255,255,255,0.8)'
              }} className="menu-item"><Icon name="edit" size={13} />重命名</div>
              <div onClick={(e) => { e.stopPropagation(); if (onDeletePreset) onDeletePreset(presetMenu.preset.id); setPresetMenu(null); }} style={{
                padding: '9px 12px', borderRadius: 6, fontSize: 12, cursor: 'pointer', transition: '0.15s',
                display: 'flex', alignItems: 'center', gap: 8, color: '#ff4d4d'
              }} className="menu-item"><Icon name="trash" size={13} />删除</div>
            </div>
          )}

          {editingPreset && (
            <div style={{ position: 'fixed', inset: 0, zIndex: 2500, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(5px)', display: 'flex', alignItems: 'center', justifyContent: 'center', mixBlendMode: 'normal' }}>
              <div className="animate-in" style={{ width: 300, background: '#1a1b1e', borderRadius: 24, border: '1px solid var(--glass-border)', padding: 28, boxShadow: '0 40px 80px rgba(0,0,0,0.6)' }}>
                <div style={{ fontSize: 16, fontFamily: 'var(--font-display)', fontStyle: 'italic', marginBottom: 16, color: '#fff' }}>重命名方案</div>
                <input autoFocus value={editName} onChange={e => setEditName(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && editName.trim()) { const updated = savedPresets.map(p => p.id === editingPreset.id ? {...p, name: editName.trim()} : p); localStorage.setItem('plum_saved_presets', JSON.stringify(updated)); window.location.reload(); }}}
                  style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid var(--glass-border)', borderRadius: 10, padding: '12px 16px', color: '#fff', marginBottom: 20, outline: 'none', fontSize: 13 }} />
                <div style={{ display: 'flex', gap: 10 }}>
                  <button className="btn-primary btn" style={{ flex: 1, justifyContent: 'center', height: 40, fontSize: 12 }} onClick={() => { if (editName.trim()) { const updated = savedPresets.map(p => p.id === editingPreset.id ? {...p, name: editName.trim()} : p); localStorage.setItem('plum_saved_presets', JSON.stringify(updated)); window.location.reload(); } }}>确认</button>
                  <button className="btn" style={{ flex: 1, justifyContent: 'center', height: 40, fontSize: 12 }} onClick={() => setEditingPreset(null)}>取消</button>
                </div>
              </div>
            </div>
          )}

          {showSavePopup && (
            <div style={{ position: 'fixed', inset: 0, zIndex: 1000, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(5px)', display: 'flex', alignItems: 'center', justifyContent: 'center', mixBlendMode: 'normal' }}>
              <div className="animate-in" style={{ width: 340, background: '#1a1b1e', borderRadius: 28, border: '1px solid var(--glass-border)', padding: 32, boxShadow: '0 50px 100px rgba(0,0,0,0.6)' }}>
                <div style={{ fontSize: 20, fontFamily: 'var(--font-display)', fontStyle: 'italic', marginBottom: 8, color: '#fff' }}>保存预设</div>
                <input 
                  autoFocus
                  placeholder="预设名称..."
                  value={presetName}
                  onChange={e => setPresetName(e.target.value)}
                  style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid var(--glass-border)', borderRadius: 12, padding: '14px 18px', color: '#fff', marginBottom: 24, outline: 'none' }}
                />
                <div style={{ display: 'flex', gap: 12 }}>
                  <button className="btn-primary btn" style={{ flex: 1, justifyContent: 'center' }} onClick={() => { const f = getCurrentFilter(); f.name = presetName; f.brightness = bri; const newId = 'user_' + Date.now(); f.id = newId; if (onSavePreset) onSavePreset(f); setCurrentPresetName(presetName); setSelectedSavedPresetId(newId); setShowSavePopup(false); }}>保存配置</button>
                  <button className="btn" style={{ flex: 1, justifyContent: 'center' }} onClick={() => setShowSavePopup(false)}>取消</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const SettingsPage = ({ fitMode, setFitMode, monitors, onClose, settings, updateSetting, wallpapers, customTags, onAddCustomTag, addToast }) => {
      const [activeTab, setActiveTab] = useState('通用');
      const [performanceData, setPerformanceData] = useState(
        [...Array(24)].map(() => ({ gpu: 0, fps: 0, mem: 0 }))
      );
      const [perfMetrics, setPerfMetrics] = useState({ gpuLoad: 0, fps: 0, memoryMB: 0 });
      const [allTags, setAllTags] = useState([]);
      const [newTagName, setNewTagName] = useState('');
      const [showNewTagInput, setShowNewTagInput] = useState(false);
      const [dragIdx, setDragIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      const [localScreenOrder, setLocalScreenOrder] = useState(null);
      const [localVolume, setLocalVolume] = useState(null);
      const [localOpacity, setLocalOpacity] = useState(null);
      const [screenRefreshRates, setScreenRefreshRates] = useState({ rates: {}, maxRate: 60 });
      const [pauseStatus, setPauseStatus] = useState({ isPaused: false, reason: '' });
      const [showCustomFPS, setShowCustomFPS] = useState(false);
      const [customFPSValue, setCustomFPSValue] = useState('');
      const [appInfo, setAppInfo] = useState(null);
      const [screens, setScreens] = useState([]);

      const s = settings || {};

      // 按保存的顺序排列显示器（本地 state 优先，否则读 settings）
      const orderedMonitors = useMemo(() => {
        const order = localScreenOrder || s.screenOrder;
        if (!order || !Array.isArray(order) || order.length === 0) return monitors;
        const sorted = [...monitors].sort((a, b) => {
          const ai = order.indexOf(a.id);
          const bi = order.indexOf(b.id);
          if (ai === -1 && bi === -1) return 0;
          if (ai === -1) return 1;
          if (bi === -1) return -1;
          return ai - bi;
        });
        return sorted;
      }, [monitors, localScreenOrder, s.screenOrder]);

      useEffect(() => {
        bridge.call('getTags').then(tags => setAllTags(tags || []));
        bridge.call('getAppInfo').then(info => setAppInfo(info)).catch(() => {});
        bridge.call('getScreens').then(list => setScreens(list || [])).catch(() => {});
      }, []);

      const storageStats = useMemo(() => {
        if (!wallpapers || wallpapers.length === 0) return { total: 0, video: 0, heic: 0 };
        let video = 0, heic = 0;
        wallpapers.forEach(w => {
          if (w.type === 'video') video += (w.fileSize || 0);
          else heic += (w.fileSize || 0);
        });
        return { total: video + heic, video, heic };
      }, [wallpapers]);

      useEffect(() => {
        if (activeTab === '性能') {
          bridge.call('getScreenRefreshRates').then(r => setScreenRefreshRates(r)).catch(() => {});
          const poll = () => {
            bridge.call('getPerformanceMetrics').then(m => {
              setPerfMetrics(m);
              setPerformanceData(prev => [...prev.slice(1), { gpu: m.gpuLoad || 0, fps: m.fps || 0, mem: m.memoryMB || 0 }]);
            }).catch(() => {});
            bridge.call('getPauseReason').then(r => setPauseStatus(r)).catch(() => {});
          };
          poll();
          const timer = setInterval(poll, 2000);
          return () => clearInterval(timer);
        }
      }, [activeTab]);
      
      const navItems = [
        { id: '通用', icon: 'monitor' },
        { id: '外观', icon: 'image' },
        { id: '音频', icon: 'volume-2' },
        { id: '播放', icon: 'play' },
        { id: '性能', icon: 'sliders' },
        { id: '库管理', icon: 'plus' },
        { id: '快捷键', icon: 'settings' },
        { id: '关于', icon: 'check' }
      ];

      const ShortcutRow = ({ label, keys }) => (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 0', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
          <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.8)' }}>{label}</span>
          <div style={{ display: 'flex', gap: 6 }}>
            {keys.map((k, i) => (
              <React.Fragment key={i}>
                <kbd style={{ 
                  minWidth: 32, height: 32, padding: '0 10px', borderRadius: 8,
                  background: 'rgba(255,255,255,0.05)',
                  border: '1px solid rgba(255,255,255,0.1)',
                  boxShadow: '0 4px 10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 12, fontWeight: 700, color: '#fff'
                }}>
                  {k}
                </kbd>
                {i < keys.length - 1 && <span style={{ alignSelf: 'center', opacity: 0.3, fontSize: 10 }}>+</span>}
              </React.Fragment>
            ))}
          </div>
        </div>
      );

      const SettingRow = ({ title, desc, children }) => (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32 }}>
          <div style={{ flex: 1, paddingRight: 40 }}>
            <div style={{ fontSize: 16, fontWeight: 600 }}>{title}</div>
            {desc && <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.3)', marginTop: 4 }}>{desc}</div>}
          </div>
          <div style={{ display: 'flex', gap: 8 }}>{children}</div>
        </div>
      );

      const Switch = ({ active, onToggle }) => (
        <div onClick={onToggle} style={{
          width: 46,
          height: 26,
          background: active ? 'linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #fff 30%))' : 'rgba(255,255,255,0.08)',
          border: '1px solid ' + (active ? 'color-mix(in srgb, var(--accent) 70%, #fff 30%)' : 'rgba(255,255,255,0.12)'),
          borderRadius: 13,
          position: 'relative',
          cursor: 'pointer',
          transition: '0.24s cubic-bezier(0.2, 1, 0.3, 1)',
          boxShadow: active ? '0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent), 0 8px 20px color-mix(in srgb, var(--accent) 28%, transparent)' : 'inset 0 1px 0 rgba(255,255,255,0.04)',
          transform: active ? 'translateZ(0)' : 'none'
        }} onMouseDown={e => { e.currentTarget.style.transform = 'scale(0.96)'; }} onMouseUp={e => { e.currentTarget.style.transform = active ? 'translateZ(0)' : 'none'; }} onMouseLeave={e => { e.currentTarget.style.transform = active ? 'translateZ(0)' : 'none'; }}>
          <div style={{
            width: 20,
            height: 20,
            background: '#fff',
            borderRadius: '50%',
            position: 'absolute',
            top: 2,
            left: active ? 22 : 2,
            transition: '0.24s cubic-bezier(0.2, 1, 0.3, 1)',
            boxShadow: active ? '0 4px 14px rgba(0,0,0,0.22), 0 0 0 3px rgba(255,255,255,0.14)' : '0 2px 8px rgba(0,0,0,0.2)'
          }} />
        </div>
      );

      return (
        <div className="animate-in" style={{
          height: '100vh', padding: '0 80px', background: '#0d0e12',
          display: 'flex', gap: 40, overflow: 'hidden', alignItems: 'flex-start', position: 'relative'
        }}>
          {/* Pro 级侧边导航 - 采用稳健材质杜绝分裂 Bug */}
          <div style={{ 
            width: 240, 
            background: '#14151a', // 改用实体色定义，杜绝 backdrop-filter 产生的分裂线
            borderRight: '1px solid rgba(255,255,255,0.05)',
            padding: '140px 12px 32px', // 基准线对齐点
            display: 'flex', flexDirection: 'column', gap: 4, flexShrink: 0,
            height: '100%'
          }}>
            {navItems.map(item => (
              <div
                key={item.id}
                onClick={() => setActiveTab(item.id)}
                style={{
                  padding: '12px 16px', borderRadius: 14, cursor: 'pointer', transition: '0.25s cubic-bezier(0.2, 1, 0.3, 1)',
                  display: 'flex', alignItems: 'center', gap: 14, position: 'relative',
                  background: activeTab === item.id ? 'rgba(255,255,255,0.06)' : 'transparent',
                  color: activeTab === item.id ? '#fff' : 'rgba(255,255,255,0.35)',
                  borderLeft: activeTab === item.id ? '2px solid var(--accent)' : '2px solid transparent',
                }}
                className="settings-nav-item"
              >
                <Icon name={item.icon} size={18} />
                <span style={{ fontSize: 14, fontWeight: activeTab === item.id ? 700 : 500, transition: '0.2s' }}>{item.id}</span>
              </div>
            ))}
          </div>

          {/* 设置主内容区 - 物理对齐 Content Area */}
          <div className="no-scrollbar" style={{ 
            flex: 1, height: '100%', background: 'rgba(255,255,255,0.01)', backdropFilter: 'blur(60px)', 
            borderRadius: 0, padding: '140px 72px 80px', overflowY: 'auto'
          }}>
            <h2 style={{ 
              fontSize: 42, fontFamily: 'var(--font-display)', fontStyle: 'italic', 
              marginBottom: 56, letterSpacing: '-0.02em', marginTop: 0,
              lineHeight: 1, color: '#fff'
            }}>{activeTab}</h2>

            {activeTab === '通用' && (
              <div className="animate-in">
                {/* 物理拓扑编辑器 */}
                <div style={{ marginBottom: 56 }}>
                   <div style={{ fontSize: 13, fontWeight: 700, color: 'rgba(255,255,255,0.3)', marginBottom: 24, textTransform: 'uppercase', letterSpacing: '0.15em' }}>显示器拓扑布局</div>
                   <div onPointerUp={() => { setDragIdx(null); setDragOverIdx(null); }} style={{
                     background: 'rgba(0,0,0,0.3)', borderRadius: 28, padding: '60px 40px 40px',
                     display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: 40,
                     border: '1px solid rgba(255,255,255,0.03)', position: 'relative',
                     boxShadow: 'inset 0 20px 40px rgba(0,0,0,0.4)'
                   }}>
                      {orderedMonitors.map((d, idx) => (
                        <div key={d.id}
                          onPointerDown={e => {
                            e.preventDefault();
                            setDragIdx(idx);
                          }}
                          onPointerEnter={() => { if (dragIdx !== null && dragIdx !== idx) setDragOverIdx(idx); }}
                          onPointerUp={() => {
                            if (dragIdx !== null && dragIdx !== idx) {
                              const reordered = [...orderedMonitors];
                              const [moved] = reordered.splice(dragIdx, 1);
                              reordered.splice(idx, 0, moved);
                              const newOrder = reordered.map(m => m.id);
                              setLocalScreenOrder(newOrder);
                              updateSetting('screenOrder', newOrder);
                              if (addToast) addToast('显示器排列已更新');
                            }
                            setDragIdx(null);
                            setDragOverIdx(null);
                          }}
                          style={{
                            textAlign: 'center',
                            cursor: dragIdx === null ? 'grab' : dragIdx === idx ? 'grabbing' : 'pointer',
                            opacity: dragIdx === idx ? 0.4 : 1,
                            transition: 'opacity 0.2s, transform 0.2s',
                            transform: dragOverIdx === idx && dragIdx !== idx ? 'scale(1.08) translateY(-4px)' : dragIdx === idx ? 'scale(0.95)' : 'none',
                            userSelect: 'none'
                          }}
                          className="topology-card">
                          <div style={{
                            width: 180, aspectRatio: '16/10', background: '#000',
                            borderRadius: 14, border: '2px solid ' + (dragOverIdx === idx && dragIdx !== idx ? '#3498DB' : d.isMain ? 'var(--accent)' : 'rgba(255,255,255,0.1)'),
                            boxShadow: dragOverIdx === idx && dragIdx !== idx ? '0 0 30px rgba(52,152,219,0.3)' : d.isMain ? '0 0 40px rgba(224,62,62,0.25)' : '0 10px 30px rgba(0,0,0,0.5)',
                            marginBottom: 20, display: 'flex', alignItems: 'center', justifyContent: 'center',
                            position: 'relative', transition: '0.4s', pointerEvents: 'none'
                          }}>
                            <Icon name="monitor" size={36} style={{ opacity: 0.3 }} />
                            <div style={{ position: 'absolute', top: 12, right: 12, fontSize: 10, background: 'rgba(255,255,255,0.08)', padding: '3px 8px', borderRadius: 6, fontWeight: 700 }}>{{p3:'P3', srgb:'sRGB', adobeRGB:'AdobeRGB'}[s.colorSpace || 'p3']}</div>
                            <div style={{ position: 'absolute', top: 12, left: 12, fontSize: 10, background: 'rgba(255,255,255,0.08)', padding: '3px 8px', borderRadius: 6, fontWeight: 700 }}>{idx + 1}</div>
                            {d.isMain && <div style={{ position: 'absolute', bottom: -12, left: '50%', transform: 'translateX(-50%)', width: 40, height: 4, background: 'var(--accent)', borderRadius: 2 }} />}
                          </div>
                          <div style={{ fontSize: 14, fontWeight: 600, pointerEvents: 'none' }}>{d.name}</div>
                          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', marginTop: 6, pointerEvents: 'none' }}>{d.resolution} · {d.isMain ? '主屏幕' : '扩展'}</div>
                        </div>
                      ))}
                      {dragIdx !== null && <div style={{ position: 'absolute', top: 16, width: '100%', textAlign: 'center', fontSize: 11, color: 'rgba(52,152,219,0.8)', fontWeight: 600 }}>松开到目标位置完成交换</div>}
                      <div style={{ position: 'absolute', bottom: 16, width: '100%', textAlign: 'center', fontSize: 11, color: 'rgba(255,255,255,0.2)' }}>拖拽显示器以排列其物理位置</div>
                   </div>
                </div>
                
                <SettingRow title="启动时自动运行" desc="开机即刻呈现沉浸式桌面体验"><Switch active={!!s.launchAtLogin} onToggle={() => bridge.call('setLaunchAtLogin', { enabled: !s.launchAtLogin }).then(r => updateSetting('launchAtLogin', r.enabled))} /></SettingRow>
                <SettingRow title="菜单栏快捷入口" desc="在顶部菜单栏显示实时状态图标"><Switch active={!!s.menuBarEnabled} onToggle={() => bridge.call('setMenuBarEnabled', { enabled: !s.menuBarEnabled }).then(r => updateSetting('menuBarEnabled', r.enabled))} /></SettingRow>
                <div style={{ opacity: 0.35, pointerEvents: 'none', position: 'relative' }}>
                  <SettingRow title="屏保集成" desc="将当前壁纸用作 macOS 系统屏保">
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ fontSize: 11, color: 'var(--fg-tertiary)', background: 'var(--glass)', padding: '3px 10px', borderRadius: 6, border: '1px solid var(--glass-border)' }}>后续版本</span>
                      <Switch active={false} />
                    </div>
                  </SettingRow>
                </div>

                <div style={{ marginTop: 40, marginBottom: 40 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'rgba(255,255,255,0.3)', marginBottom: 24, textTransform: 'uppercase', letterSpacing: '0.15em' }}>显示与色彩</div>
                  <SettingRow title="显示模式" desc="多显示器壁纸分配策略">

                    const points = performanceData.map(d => Math.min(1, (d[stat.dataKey] || 0) / maxVal));
                    const w = 200, h = 56;
                    const genPath = (pts) => {
                      if (pts.length < 2) return '';
                      const coords = pts.map((v, i) => [i * (w / (pts.length - 1)), h - v * h * 0.85]);
                      let d = `M${coords[0][0]},${coords[0][1]}`;
                      for (let i = 1; i < coords.length; i++) {
                        const prev = coords[i - 1];
                        const curr = coords[i];
                        const tension = 0.3;
                        const cp1x = prev[0] + (curr[0] - (coords[i-2]?.[0] ?? prev[0])) * tension;
                        const cp1y = prev[1] + (curr[1] - (coords[i-2]?.[1] ?? prev[1])) * tension;
                        const cp2x = curr[0] - (((coords[i+1]?.[0] ?? curr[0]) - prev[0]) * tension);

                      }
                      return d;
                    };

                          <path d={linePath} fill="none" stroke={stat.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.8 }} />
                        </svg>

    // --- Root ---

    const App = () => {
      const [view, setView] = useState('home');
      const [libraryInitialFilter, setLibraryInitialFilter] = useState('全部');
      const [showMonitorPopup, setShowMonitorPopup] = useState(false);
      const [showPanoramaPreview, setShowPanoramaPreview] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [droppedImportFiles, setDroppedImportFiles] = useState([]);
      const [librarySortBy, setLibrarySortBy] = useState('importDate');
      const [librarySortOrder, setLibrarySortOrder] = useState('desc');
      const [wallpapers, setWallpapers] = useState([]);
      const [selectedWallpaper, setSelectedWallpaper] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [isSearching, setIsSearching] = useState(false);
      const [importProgress, setImportProgress] = useState(null);
      const [toasts, setToasts] = useState([]);
      const [fitMode, setFitMode] = useState('填充');
      const [activeMonitors, setActiveMonitors] = useState([]);
      const [settings, setSettings] = useState({});
      const [savedPresets, setSavedPresets] = useState(() => {
        try { return JSON.parse(localStorage.getItem('plum_saved_presets') || '[]'); } catch(e) { return []; }
      });
      const [customTags, setCustomTags] = useState(() => {
        try { return JSON.parse(localStorage.getItem('plum_custom_tags') || '[]'); } catch(e) { return []; }
      });

      const handleAddCustomTag = (tag) => {
        if (tag && !customTags.includes(tag)) {
          const updated = [...customTags, tag];
          setCustomTags(updated);
          localStorage.setItem('plum_custom_tags', JSON.stringify(updated));
        }
      };

      const handleSavePreset = (preset) => {
        const newPresets = [...savedPresets, { ...preset, id: preset.id || ('user_' + Date.now()) }];
        setSavedPresets(newPresets);
        localStorage.setItem('plum_saved_presets', JSON.stringify(newPresets));
      };

      const handleDeletePreset = (presetId) => {
        const newPresets = savedPresets.filter(p => p.id !== presetId);
        setSavedPresets(newPresets);
        localStorage.setItem('plum_saved_presets', JSON.stringify(newPresets));
      };

      const refreshWallpapers = () => {
        bridge.call('getWallpapers').then(data => {
          setWallpapers(data);
          if (!selectedWallpaper && data.length > 0) setSelectedWallpaper(data[0]);
        });
      };

      useEffect(() => {
        refreshWallpapers();
        bridge.call('getScreens').then(data => setActiveMonitors(data));
        bridge.call('getSettings').then(data => setSettings(data));
      }, []);

      useEffect(() => {
        if (settings.accentColor) {
          document.documentElement.style.setProperty('--accent', settings.accentColor);
        }
      }, [settings.accentColor]);

      useEffect(() => {
        const enabled = settings.animationsEnabled !== false;
        if (!enabled) {
          document.documentElement.style.setProperty('--transition-duration', '0s');
          document.documentElement.style.setProperty('--animation-duration', '0s');
        } else {
          document.documentElement.style.removeProperty('--transition-duration');
          document.documentElement.style.removeProperty('--animation-duration');
        }
      }, [settings.animationsEnabled]);

      useEffect(() => {
        window.__receiveDroppedFiles = (files) => {
          console.log('[DRAG-L4-JS] __receiveDroppedFiles called with', files ? files.length : 0, 'files');
          if (files && files.length > 0) {
            setDroppedImportFiles([]);
            setShowImportModal(false);
            setTimeout(() => {
              setDroppedImportFiles(files);
              setShowImportModal(true);
            }, 0);
          }
        };
        return () => { delete window.__receiveDroppedFiles; };
      }, []);

      const updateSetting = (key, value) => {
        setSettings(prev => ({ ...prev, [key]: value }));
        bridge.call('updateSettings', { settings: { [key]: value } });
      };

      const addToast = (msg) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
      };

      const handleSetWallpaper = (w) => {
        setSelectedWallpaper(w);
        const topology = settings.displayTopology || 'independent';

        if (topology === 'mirror') {
          // 镜像模式：直接应用到所有显示器
          handleApplyWallpaper('all', null, w);
        } else if (topology === 'panorama') {
          // 全景模式：显示全景预览面板
          setShowPanoramaPreview(true);
        } else {
          // 独立模式：显示显示器选择器
          setShowMonitorPopup(true);
        }
      };

      const handleApplyWallpaper = (monitorId, mode, wallpaper) => {
        const w = wallpaper || selectedWallpaper;
        if (!w) return;
        const params = { wallpaperId: w.id };
        if (monitorId !== 'all') params.screenId = monitorId;
        if (mode) params.mode = mode;

        bridge.call('setWallpaper', params).then(() => {
          addToast(monitorId === 'all' ? '已应用到所有显示器' : '已成功设为桌面壁纸');
        }).catch(() => {
          addToast('设置壁纸失败');
        });
      };

      const handleToggleFavorite = (wallpaper) => {
        bridge.call('toggleFavorite', { wallpaperId: wallpaper.id }).then((result) => {
          addToast(result.isFavorite ? '已添加到收藏' : '已取消收藏');
          refreshWallpapers();
        });
      };

      const handleDelete = (wallpaper) => {
        bridge.call('deleteWallpaper', { wallpaperId: wallpaper.id }).then(() => {
          addToast('已从库中移除');
          refreshWallpapers();
        });
      };

      const handleImport = (paths, meta) => {
        if (!paths || paths.length === 0) {
          addToast('请选择文件');
          return;
        }

        bridge.call('importFiles', {
          paths: paths,
          name: meta.name || '',
          tag: meta.tag,
          favorite: meta.fav
        }).then((result) => {
          addToast('已导入 ' + result.length + ' 个壁纸');
          refreshWallpapers();
          setShowImportModal(false);
          setDroppedImportFiles([]);
        }).catch((err) => {
          addToast('导入失败: ' + (err.message || '未知错误'));
        });
      };

      const handlePreview = (w) => {
        if (w) setSelectedWallpaper(w);
        setView('preview');
      };

      const handleGoToColor = (w) => {
        if (w) setSelectedWallpaper(w);
        setView('color');
      };

      const handleViewAll = (category) => {
        setLibraryInitialFilter(category === '收藏' ? '全部' : category);
        setView('library');
      };

      const handleApplyFilter = (wallpaper, preset) => {
        bridge.call('applyFilter', { wallpaperId: wallpaper.id, filter: preset }).then(() => {
          addToast('滤镜已应用');
        });
      };

      const filteredWallpapers = useMemo(() => {
        const filtered = wallpapers.filter(w =>
          w.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          (w.tags && w.tags.some(tag => (tag.name || tag).toLowerCase().includes(searchQuery.toLowerCase())))
        );

        const sorted = [...filtered].sort((a, b) => {
          let av, bv;
          switch (librarySortBy) {
            case 'name':
              av = (a.name || '').toLowerCase();
              bv = (b.name || '').toLowerCase();
              break;
            case 'fileSize':
              av = a.fileSize || 0;
              bv = b.fileSize || 0;
              break;
            case 'resolution':
              av = a.resolution || '';
              bv = b.resolution || '';
              break;
            case 'favorite':
              av = a.isFavorite ? 1 : 0;
              bv = b.isFavorite ? 1 : 0;
              break;
            case 'importDate':
            default:
              av = new Date(a.importDate || 0).getTime();
              bv = new Date(b.importDate || 0).getTime();
              break;
          }
          if (av < bv) return librarySortOrder === 'asc' ? -1 : 1;
          if (av > bv) return librarySortOrder === 'asc' ? 1 : -1;
          return 0;
        });

        return sorted;
      }, [searchQuery, wallpapers, librarySortBy, librarySortOrder]);

      return (
        <div style={{ background: 'var(--bg)', height: '100vh', position: 'relative', overflow: 'hidden' }}>
          {view !== 'color' && view !== 'preview' && (
            <TopNav 
              currentView={view} 
              setView={setView} 
              onSearchClick={() => setIsSearching(true)} 
              onImportClick={() => { setDroppedImportFiles([]); setShowImportModal(true); }}
            />
          )}

          <main style={{ height: '100vh' }}>
            {view === 'home' && wallpapers.length > 0 && (
              <HomePage
                wallpapers={wallpapers}
                onSetWallpaper={handleSetWallpaper}
                fitMode={fitMode}
                onPreview={handlePreview}
                onEditColor={handleGoToColor}
                onToggleFavorite={handleToggleFavorite}
                onDelete={handleDelete}
                onViewAll={handleViewAll}
              />
            )}
            {view === 'library' && (
              <LibraryPage
                wallpapers={filteredWallpapers}
                setView={handlePreview}
                onSetWallpaper={handleSetWallpaper}
                onEditColor={handleGoToColor}
                onToggleFavorite={handleToggleFavorite}
                onDelete={handleDelete}
                initialFilter={libraryInitialFilter}
                sortBy={librarySortBy}
                sortOrder={librarySortOrder}
                onChangeSortBy={setLibrarySortBy}
                onToggleSortOrder={() => setLibrarySortOrder(prev => prev === 'desc' ? 'asc' : 'desc')}
                settings={settings}
              />
            )}
            {view === 'color' && selectedWallpaper && (
              <ColorPage
                wallpaper={selectedWallpaper}
                setView={setView}
                savedPresets={savedPresets}
                onSavePreset={handleSavePreset}
                onDeletePreset={handleDeletePreset}
                onSave={(filterParams) => {
                  if (filterParams._isDefault) {
                    bridge.call('removeFilter', { wallpaperId: selectedWallpaper.id }).then(() => {
                      addToast('已重置色彩方案');
                      refreshWallpapers();
                    }).catch(() => addToast('重置失败'));
                  } else {
                    bridge.call('applyFilter', { wallpaperId: selectedWallpaper.id, filter: filterParams }).then(() => {
                      addToast('色彩配置已应用');
                      refreshWallpapers();
                    }).catch(() => addToast('应用失败'));
                  }
                }}
                settings={settings}
              />
            )}
            {view === 'preview' && selectedWallpaper && (
              <PreviewPage
                wallpaper={selectedWallpaper}
                onClose={() => setView('home')}
                settings={settings}
              />
            )}
            {view === 'settings' && (
              <SettingsPage
                fitMode={fitMode}
                setFitMode={setFitMode}
                monitors={activeMonitors}
                onClose={() => setView('home')}
                settings={settings}
                updateSetting={updateSetting}
                wallpapers={wallpapers}
                customTags={customTags}
                onAddCustomTag={handleAddCustomTag}
                addToast={addToast}
              />
            )}
          </main>

          {/* Import Modal */}
          {showImportModal && (
            <ImportModal
              key={droppedImportFiles.map(f => f.path).join('|') || 'manual-import'}
              onClose={() => { setShowImportModal(false); setDroppedImportFiles([]); }}
              onStartImport={handleImport}
              initialFiles={droppedImportFiles}
              customTags={customTags}
              onAddCustomTag={handleAddCustomTag}
            />
          )}

          {/* Search Overlay */}
          {isSearching && (
            <div className="animate-in" style={{ 
              position: 'fixed', inset: 0, 
              background: 'rgba(0,0,0,0.8)', 
              backdropFilter: 'blur(80px)', 
              zIndex: 8000, display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 140 
            }} onClick={() => setIsSearching(false)}>
               
               {/* 顶部退出按钮 */}
               <div style={{ position: 'absolute', top: 40, right: 56 }}>
                 <button onClick={() => setIsSearching(false)} className="btn" style={{ width: 56, height: 56, borderRadius: '50%', padding: 0, justifyContent: 'center' }}>
                   <Icon name="close" size={24} />
                 </button>
               </div>

               <div style={{ width: '100%', maxWidth: 900, padding: '0 40px' }} onClick={e => e.stopPropagation()}>
                  <div style={{ position: 'relative', marginBottom: 60 }}>
                    <input 
                      autoFocus
                      placeholder="探索您的资源库..." 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      onKeyDown={(e) => e.key === 'Escape' && setIsSearching(false)}
                      style={{ 
                        width: '100%', background: 'transparent', border: 'none', 
                        borderBottom: '2px solid rgba(255,255,255,0.1)', color: '#fff', 
                        fontSize: 64, fontFamily: 'var(--font-display)', fontStyle: 'italic',
                        padding: '24px 0', outline: 'none', transition: '0.3s'
                      }} 
                    />
                    <div style={{ position: 'absolute', right: 0, bottom: 32, display: 'flex', gap: 8, alignItems: 'center', opacity: 0.4 }}>
                       <kbd style={{ background: 'rgba(255,255,255,0.1)', padding: '4px 8px', borderRadius: 4, fontSize: 12 }}>ESC</kbd>
                       <span style={{ fontSize: 12 }}>退出搜索</span>
                    </div>
                  </div>

                  <div style={{ marginBottom: 24, fontSize: 13, color: 'rgba(255,255,255,0.3)', textTransform: 'uppercase', letterSpacing: '0.2em' }}>
                    {searchQuery ? `找到 ${filteredWallpapers.length} 个匹配项` : '建议与热门'}
                  </div>

                  <div style={{ 
                    display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 32,
                    maxHeight: '50vh', overflowY: 'auto', paddingRight: 20
                  }} className="no-scrollbar">
                    {filteredWallpapers.map((w, i) => (
                      <div 
                        key={w.id} 
                        onClick={() => { handleSetWallpaper(w); setIsSearching(false); }} 
                        style={{ 
                          cursor: 'pointer', transition: '0.4s cubic-bezier(0.2, 1, 0.3, 1)', 
                          animation: `fadeIn 0.5s forwards ${i * 0.05}s`, opacity: 0 
                        }} 
                        className="search-result-v2"
                      >
                        <div style={{ position: 'relative', aspectRatio: '16/9', borderRadius: 16, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.1)', marginBottom: 12 }}>
                          <img src={w.thumbnailPath} style={{ width: '100%', height: '100%', objectFit: 'cover', filter: getFilterCSS(w.filterPreset) }} />
                          <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.2)', transition: '0.3s' }} className="overlay" />
                        </div>
                        <div style={{ fontSize: 16, fontWeight: 600 }}>{w.name}</div>
                        <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 4 }}>{w.tags && w.tags[0] ? (w.tags[0].name || String(w.tags[0])) : ''} · {w.type}</div>
                      </div>
                    ))}
                    {filteredWallpapers.length === 0 && (
                      <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '100px 0', color: 'rgba(255,255,255,0.2)' }}>
                        未找到匹配结果
                      </div>
                    )}
                  </div>
               </div>
            </div>
          )}

          <style>{`
            .search-result-v2:hover { transform: translateY(-8px); }
            .search-result-v2:hover .overlay { background: rgba(0,0,0,0); }
            .search-result-v2:hover img { transform: scale(1.05); transition: 0.8s; }
          `}</style>

          {/* Import Progress Overlay */}
          {importProgress !== null && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', zIndex: 6000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 400, background: '#1a1b1e', padding: 40, borderRadius: 24, border: '1px solid var(--glass-border)', textAlign: 'center' }}>
                <div style={{ fontSize: 18, marginBottom: 24, fontFamily: 'var(--font-display)', fontStyle: 'italic' }}>正在解析壁纸资源...</div>
                <div style={{ height: 4, background: 'rgba(255,255,255,0.1)', borderRadius: 2, overflow: 'hidden', marginBottom: 12 }}>
                  <div style={{ width: `${importProgress}%`, height: '100%', background: 'var(--accent)', transition: '0.1s' }} />
                </div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>{importProgress}% - 请勿关闭应用</div>
              </div>
            </div>
          )}

          {showMonitorPopup && selectedWallpaper && activeMonitors.length > 0 && (
            <MonitorSelector
              wallpaper={selectedWallpaper}
              monitors={activeMonitors}
              onCancel={() => setShowMonitorPopup(false)}
              onApply={(type) => {
                setShowMonitorPopup(false);
                handleApplyWallpaper(type);
              }}
            />
          )}

          {showPanoramaPreview && selectedWallpaper && activeMonitors.length > 0 && (
            <PanoramaPreview
              wallpaper={selectedWallpaper}
              monitors={activeMonitors}
              onCancel={() => setShowPanoramaPreview(false)}
              onApply={(type) => {
                setShowPanoramaPreview(false);
                handleApplyWallpaper(type, 'panorama');
              }}
            />
          )}

          {/* Toast System */}
          <div style={{ position: 'fixed', bottom: 32, right: 32, display: 'flex', flexDirection: 'column', gap: 12, zIndex: 7000 }}>
            {toasts.map(t => (
              <div key={t.id} className="animate-in" style={{ background: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(20px)', padding: '12px 24px', borderRadius: 12, border: '1px solid var(--glass-border)', display: 'flex', alignItems: 'center', gap: 12, fontSize: 14, boxShadow: '0 10px 30px rgba(0,0,0,0.2)' }}>
                <div style={{ color: '#2ECC71' }}><Icon name="check" size={16} /></div>
                {t.msg}
              </div>
            ))}
          </div>
          
          <style>{`.search-result:hover { transform: scale(1.05); opacity: 1; transition: 0.3s; }`}</style>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
