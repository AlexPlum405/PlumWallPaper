<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlumWallPaper v5 - macOS 离线动态壁纸管理</title>
  <!-- 字体引用 -->
  <style>
    @font-face {
      font-family: 'Cormorant Garamond';
      src: url('CormorantGaramond-Italic.ttf') format('truetype');
      font-style: italic;
      font-weight: 300 500;
    }
    @font-face {
      font-family: 'Cormorant Garamond';
      src: url('CormorantGaramond-SemiBoldItalic.ttf') format('truetype');
      font-style: italic;
      font-weight: 600 700;
    }
  </style>

  <!-- React & Babel -->
  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>
  <script src="babel.min.js"></script>
  <script src="bridge.js"></script>

  <style>
    :root {
      --bg: #0d0e12;
      --fg: #ffffff;
      --accent: #E03E3E; 
      --glass: rgba(255, 255, 255, 0.04);
      --glass-heavy: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-display: 'Cormorant Garamond', serif;
      --font-ui: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      background: #000;
      color: var(--fg);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    /* 隐藏滚动条但保留功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 按钮基础样式 */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { background: var(--glass-heavy); transform: translateY(-1px); }
    .btn-primary { background: #fff; color: #000; font-weight: 600; border: none; }
    .btn-primary:hover { background: var(--accent); color: #fff; }

    /* 模拟 macOS 红绿灯 */
    .traffic-lights { display: flex; gap: 8px; }
    .light { width: 12px; height: 12px; border-radius: 50%; }
    .light.red { background: #ff5f57; }
    .light.yellow { background: #febc2e; }
    .light.green { background: #28c840; }

    /* 动画 */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Utility Functions ---
    const formatSize = (bytes) => {
      if (!bytes) return '-';
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + 'GB';
      if (bytes >= 1048576) return (bytes / 1048576).toFixed(0) + 'MB';
      return (bytes / 1024).toFixed(0) + 'KB';
    };

    const formatDuration = (seconds) => {
      if (!seconds || seconds <= 0) return '-';
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = Math.floor(seconds % 60).toString().padStart(2, '0');
      return m + ':' + s;
    };

    // --- Components ---

    const Icon = ({ name, size = 18 }) => {
      const icons = {
        search: <path d="M19 19l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />,
        plus: <path d="M12 5v14M5 12h14" />,
        settings: <><circle cx="12" cy="12" r="3" /><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" /></>,
        heart: <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />,
        check: <path d="M20 6L9 17l-5-5" />,
        close: <path d="M18 6L6 18M6 6l12 12" />,
        play: <path d="M5 3l14 9-14 9V3z" />,
        image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><circle cx="8.5" cy="8.5" r="1.5" /><path d="M21 15l-5-5L5 21" /></>,
        monitor: <><rect x="2" y="3" width="20" height="14" rx="2" /><path d="M8 21h8M12 17v4" /></>,
        sliders: <path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6" />,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {icons[name]}
        </svg>
      );
    };

    const MonitorSelector = ({ onCancel, onApply, wallpaper, monitors }) => {
      const [selectedMonitor, setSelectedMonitor] = useState(monitors.length > 0 ? monitors[0].id : null);

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(40px)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40 }}>
          <div className="animate-in" style={{ background: '#1a1b1e', width: '100%', maxWidth: 740, borderRadius: 32, border: '1px solid rgba(255,255,255,0.1)', overflow: 'hidden', boxShadow: '0 50px 100px rgba(0,0,0,0.6)' }}>
            <div style={{ padding: '32px 40px', borderBottom: '1px solid rgba(255,255,255,0.08)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <h2 style={{ fontSize: 26, fontStyle: 'italic', fontWeight: 600, fontFamily: 'var(--font-display)', letterSpacing: '-0.02em' }}>选择目标显示器</h2>
                <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', marginTop: 4 }}>点击设备卡片以分配壁纸资源</p>
              </div>
              <button onClick={onCancel} className="btn" style={{ borderRadius: '50%', width: 40, height: 40, padding: 0, justifyContent: 'center' }}><Icon name="close" /></button>
            </div>
            
            <div style={{ padding: '48px 60px' }}>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 32, marginBottom: 40 }}>
                {monitors.map(m => (
                  <div key={m.id} 
                    onClick={() => setSelectedMonitor(m.id)}
                    className="screen-card-v2"
                    style={{ 
                      border: '2px solid ' + (selectedMonitor === m.id ? 'var(--accent)' : 'rgba(255,255,255,0.05)'), 
                      borderRadius: 24, padding: 24, background: selectedMonitor === m.id ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)', 
                      cursor: 'pointer', position: 'relative', transition: '0.4s cubic-bezier(0.2, 1, 0.3, 1)',
                      textAlign: 'center'
                    }}>
                    
                    {/* Aura Glow */}
                    {selectedMonitor === m.id && (
                      <div style={{ position: 'absolute', inset: -15, background: 'radial-gradient(circle, var(--accent) 0%, transparent 70%)', opacity: 0.15, zIndex: -1, filter: 'blur(20px)' }} />
                    )}

                    <div style={{ aspectRatio: '16/10', background: '#000', borderRadius: 12, marginBottom: 20, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.1)', position: 'relative' }}>
                       <img src={wallpaper.thumbnailPath} style={{ width: '100%', height: '100%', objectFit: 'cover', opacity: selectedMonitor === m.id ? 1 : 0.4, transition: '0.6s' }} />
                       <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: selectedMonitor === m.id ? 0 : 0.4 }}>
                         <Icon name="monitor" size={48} />
                       </div>
                    </div>

                    <div style={{ fontSize: 16, fontWeight: 700, color: selectedMonitor === m.id ? '#fff' : 'rgba(255,255,255,0.6)' }}>{m.name}</div>
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 6 }}>{m.resolution} {m.isMain && '· 主屏幕'}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ padding: '32px 48px', background: 'rgba(255,255,255,0.02)', borderTop: '1px solid rgba(255,255,255,0.08)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
               <button className="btn" style={{ background: 'transparent', color: 'var(--accent)', fontSize: 13, fontWeight: 600 }} onClick={() => onApply('all')}>应用于所有显示器</button>
               <div style={{ display: 'flex', gap: 16 }}>
                 <button className="btn" style={{ padding: '10px 24px' }} onClick={onCancel}>取消</button>
                 <button className="btn-primary btn" style={{ padding: '10px 32px' }} onClick={() => onApply(selectedMonitor)}>确认分配</button>
               </div>
            </div>
            
            <style>{`
              .screen-card-v2:hover { transform: translateY(-8px); background: rgba(255,255,255,0.06); }
              .screen-card-v2:hover img { opacity: 0.8 !important; }
            `}</style>
          </div>
        </div>
      );
    };

    const TopNav = ({ currentView, setView, onSearchClick, onImportClick }) => (
      <nav style={{ 
        position: 'absolute', top: 0, left: 0, right: 0, height: 110, padding: '0 56px', 
        display: 'flex', alignItems: 'center', gap: 32, zIndex: 1000,
        background: 'linear-gradient(to bottom, rgba(0,0,0,0.4), transparent)'
      }}>
        <div className="branding" onClick={() => setView('home')} style={{ display: 'flex', alignItems: 'center', gap: 16, cursor: 'pointer', transition: '0.4s cubic-bezier(0.2, 1, 0.3, 1)' }}>
          <div style={{
            width: 44, height: 44, background: '#16181c', borderRadius: 12,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 10px 25px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1)',
            position: 'relative'
          }}>
            <svg viewBox="0 0 40 40" width="30" height="30"><path d="M20 36C28 36 34 30 34 22C34 14 20 6 20 6C20 6 6 14 6 22C6 30 12 36 20 36Z" fill="#E03E3E"/><path d="M20 2V8" stroke="#2ECC71" strokeWidth="4" strokeLinecap="round"/></svg>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1 }}>
            <span style={{ fontSize: 28, fontWeight: 700, fontFamily: 'var(--font-display)', fontStyle: 'italic', color: '#fff', letterSpacing: '-0.02em' }}>Plum</span>
            <span style={{ fontSize: 9, fontWeight: 300, textTransform: 'uppercase', color: 'rgba(255,255,255,0.3)', letterSpacing: '0.4em', marginTop: 2 }}>WallPaper</span>
          </div>
        </div>

        {/* 灵动分段控制器：去容器边框 */}
        <div style={{ display: 'flex', position: 'relative', padding: 2, marginLeft: 16 }}>
          {['home', 'library'].map(v => (
            <button key={v} onClick={() => setView(v)} style={{ 
              position: 'relative', zIndex: 1, padding: '10px 24px', borderRadius: 12, border: 'none', 
              background: 'transparent', color: currentView === v ? '#fff' : 'rgba(255,255,255,0.4)', 
              fontSize: 14, fontWeight: 600, cursor: 'pointer', transition: '0.4s', display: 'flex', alignItems: 'center', gap: 8
            }}>
              {currentView === v && (
                <div style={{ position: 'absolute', inset: 0, background: 'rgba(255,255,255,0.08)', backdropFilter: 'blur(20px)', borderRadius: 12, zIndex: -1, boxShadow: '0 4px 15px rgba(0,0,0,0.1)' }} className="animate-in" />
              )}
              <Icon name={v === 'home' ? 'monitor' : 'image'} size={14} />
              {v === 'home' ? '首页' : '壁纸库'}
            </button>
          ))}
        </div>

        {/* 简洁功能按钮组：去圆形框 */}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
          {[
            { id: 'search', icon: 'search', action: onSearchClick },
            { id: 'import', icon: 'plus', action: onImportClick },
            { id: 'settings', icon: 'settings', action: () => setView('settings'), active: currentView === 'settings' }
          ].map(btn => (
            <button 
              key={btn.id}
              onClick={btn.action} 
              className="topbar-btn-v3"
              style={{ 
                width: 40, height: 40, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', 
                background: btn.active ? 'rgba(255,255,255,0.08)' : 'transparent', 
                border: 'none', cursor: 'pointer', color: btn.active ? '#fff' : 'rgba(255,255,255,0.4)', 
                transition: '0.3s cubic-bezier(0.2, 1, 0.3, 1)'
              }}
            >
              <Icon name={btn.icon} size={20} />
            </button>
          ))}
        </div>

        <style>{`
          .topbar-btn-v3:hover { background: rgba(255,255,255,0.08); color: #fff; }
          .branding:hover { transform: scale(1.02); }
        `}</style>
      </nav>
    );

    // --- Pages ---

    const ImportModal = ({ onClose, onStartImport }) => {
      const [step, setStep] = useState(1); // 1: Select, 2: Metadata
      const [selectedFiles, setSelectedFiles] = useState([]);
      const [meta, setMeta] = useState({ name: '', tag: '自然', fav: false });

      const handleFileSelect = () => {
        console.log('[Import] Opening file picker for batch files');
        bridge.call('selectFiles').then((result) => {
          console.log('[Import] Files selected:', result);
          if (result && result.length > 0) {
            setSelectedFiles(result);
            setMeta({ ...meta, name: result[0].name || '导入的壁纸' });
            setStep(2);
          }
        }).catch((err) => {
          console.error('[Import] File selection error:', err);
        });
      };

      const handleFolderSelect = () => {
        console.log('[Import] Opening folder picker');
        bridge.call('selectFolder').then((result) => {
          console.log('[Import] Folder selected:', result);
          if (result && result.length > 0) {
            setSelectedFiles(result);
            setMeta({ ...meta, name: '批量导入' });
            setStep(2);
          }
        }).catch((err) => {
          console.error('[Import] Folder selection error:', err);
        });
      };

      const handleConfirmImport = () => {
        console.log('[Import] Confirming import with metadata:', meta);
        const paths = selectedFiles.map(f => f.path);
        onStartImport({ paths, metadata: meta });
      };

      return (
        <div className="animate-in" style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(30px)', zIndex: 6000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ width: step === 1 ? 640 : 520, background: '#1a1b1e', borderRadius: 28, border: '1px solid var(--glass-border)', overflow: 'hidden', boxShadow: '0 50px 100px rgba(0,0,0,0.6)', transition: '0.4s cubic-bezier(0.2, 1, 0.3, 1)' }}>
            <div style={{ padding: '28px 40px', borderBottom: '1px solid var(--glass-border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <h2 style={{ fontSize: 22, fontWeight: 600, fontFamily: 'var(--font-display)', fontStyle: 'italic' }}>
                  {step === 1 ? '导入壁纸资源' : '完善壁纸信息'}
                </h2>
                <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 4 }}>
                  {step === 1 ? '支持 Apple ProRAW, HEIC 及 8K 视频' : '为新资源配置分类与元数据'}
                </p>
              </div>
              <button onClick={onClose} className="btn" style={{ borderRadius: '50%', width: 36, height: 36, padding: 0, justifyContent: 'center' }}><Icon name="close" /></button>
            </div>

            <div style={{ padding: 40 }}>
              {step === 1 ? (
                <div className="animate-in">
                  <div
                    onClick={handleFileSelect}
                    style={{
                      height: 240, border: '2px dashed rgba(255,255,255,0.1)', borderRadius: 24,
                      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                      gap: 20, cursor: 'pointer', transition: '0.4s', background: 'rgba(255,255,255,0.02)'
                    }}
                    onMouseOver={(e) => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
                    onMouseOut={(e) => { e.currentTarget.style.borderColor = 'rgba(255,255,255,0.1)'; e.currentTarget.style.background = 'rgba(255,255,255,0.02)'; }}
                  >
                    <div style={{ width: 80, height: 80, background: 'rgba(255,255,255,0.05)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--accent)' }}>
                      <Icon name="plus" size={40} />
                    </div>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 18, fontWeight: 500 }}>在此处添加您的资源</div>
                      <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.3)', marginTop: 8 }}>或者拖拽文件到窗口内</div>
                    </div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 32 }}>
                    <button onClick={handleFileSelect} className="btn" style={{ height: 50, justifyContent: 'center' }}><Icon name="image" size={18} /> 批量文件</button>
                    <button onClick={handleFolderSelect} className="btn" style={{ height: 50, justifyContent: 'center' }}><Icon name="monitor" size={18} /> 整包导入</button>
                  </div>
                </div>
              ) : (
                <div className="animate-in" style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
                  <div>
                    <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', marginBottom: 8 }}>资源名称</div>
                    <input value={meta.name} onChange={e => setMeta({...meta, name: e.target.value})} style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid var(--glass-border)', borderRadius: 12, padding: '12px 16px', color: '#fff', outline: 'none' }} />
                  </div>
                  <div>
                    <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', marginBottom: 12 }}>所属分类标签</div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                      {['自然', '城市', '动漫', '极简', '暗色', '4K'].map(t => (
                        <div key={t} onClick={() => setMeta({...meta, tag: t})} style={{
                          padding: '6px 14px', borderRadius: 8, fontSize: 12, cursor: 'pointer', transition: '0.2s',
                          background: meta.tag === t ? 'var(--accent)' : 'rgba(255,255,255,0.05)',
                          color: meta.tag === t ? '#fff' : 'rgba(255,255,255,0.4)',
                          border: '1px solid ' + (meta.tag === t ? 'var(--accent)' : 'var(--glass-border)')
                        }}>{t}</div>
                      ))}
                      <div style={{ padding: '6px 14px', borderRadius: 8, fontSize: 12, cursor: 'pointer', background: 'rgba(255,255,255,0.05)', border: '1px solid var(--glass-border)', color: 'var(--accent)' }}>+ 新增分类</div>
                    </div>
                  </div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(255,255,255,0.02)', padding: '16px 20px', borderRadius: 16 }}>
                    <div style={{ fontSize: 14 }}>加入我的收藏</div>
                    <div onClick={() => setMeta({...meta, fav: !meta.fav})} style={{ width: 44, height: 24, background: meta.fav ? 'var(--accent)' : 'rgba(255,255,255,0.1)', borderRadius: 12, position: 'relative', cursor: 'pointer', transition: '0.3s' }}>
                      <div style={{ width: 18, height: 18, background: '#fff', borderRadius: '50%', position: 'absolute', top: 3, [meta.fav ? 'right' : 'left']: 3, transition: '0.3s' }} />
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div style={{ padding: '24px 40px', background: 'rgba(255,255,255,0.02)', borderTop: '1px solid var(--glass-border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)' }}>
                {step === 1 ? '存储路径: /Documents/WallPapers/Library' : `即将导入 ${selectedFiles.length} 个资源`}
              </div>
              <div style={{ display: 'flex', gap: 12 }}>
                <button onClick={step === 1 ? onClose : () => setStep(1)} className="btn" style={{ padding: '10px 24px' }}>
                  {step === 1 ? '取消' : '返回上一步'}
                </button>
                <button onClick={step === 1 ? handleFileSelect : handleConfirmImport} className="btn-primary btn" style={{ padding: '10px 32px' }}>
                  {step === 1 ? '开始分析' : '确认并导入'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const PreviewPage = ({ wallpaper, onClose }) => (
      <div className="animate-in" style={{ position: 'fixed', inset: 0, background: '#000', zIndex: 5000, display: 'flex', flexDirection: 'column' }}>
        <div style={{ position: 'absolute', top: 40, left: 40, right: 40, display: 'flex', justifyContent: 'flex-end', alignItems: 'center', zIndex: 10 }}>
          <div style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(20px)', padding: '8px 24px', borderRadius: 100, border: '1px solid rgba(255,255,255,0.1)', fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.6)' }}>Immersive Preview</div>
          <button onClick={onClose} className="btn" style={{ borderRadius: '50%', width: 44, height: 44, justifyContent: 'center', background: 'rgba(255,255,255,0.1)', border: 'none', backdropFilter: 'blur(10px)' }}><Icon name="close" /></button>
        </div>
        {wallpaper.type === 'video' ? (
          <video src={wallpaper.filePath} autoPlay loop muted style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
        ) : (
          <img src={wallpaper.filePath} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
        )}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 280, background: 'linear-gradient(to top, rgba(0,0,0,0.9), transparent)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 40px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
            <span style={{ padding: '4px 12px', background: 'var(--accent)', borderRadius: 6, fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.1em' }}>{wallpaper.tags && wallpaper.tags[0]}</span>
            {wallpaper.isFavorite && <Icon name="heart" size={14} />}
          </div>
          <h2 style={{ fontSize: 48, fontFamily: 'var(--font-display)', fontStyle: 'italic', marginBottom: 12, letterSpacing: '-0.02em' }}>{wallpaper.name}</h2>

        const el = e.currentTarget;
        const x = e.pageX - el.offsetLeft;

        if (Math.abs(walk) > 5) setDragState(prev => ({ ...prev, moved: true }));

        hue-rotate(${hue}deg) 
        saturate(${sat}%) 
        brightness(${bri}%) 
        contrast(${con}%) 
        blur(${blur}px)
        grayscale(${gray}%)
        invert(${inv}%)

                      <div key={t} style={{ 
                        padding: '10px 20px', background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.06)', 
                        borderRadius: 12, fontSize: 14, display: 'flex', alignItems: 'center', gap: 12, transition: '0.2s'
                      }} className="tag-item">
                        {t} <span style={{ opacity: 0.2, cursor: 'pointer' }}>×</span>
                      </div>
                    ))}
                    <button className="btn" style={{ padding: '10px 20px', fontSize: 14, color: 'var(--accent)', fontWeight: 700 }}>+ 新增分类</button>
                  </div>
                </div>
              </div>
            )}

            {activeTab === '外观' && (
              <div className="animate-in">
                <SettingRow title="配色主题" desc="随 macOS 系统外观自动同步">
                   {['自动', '浅色', '深色'].map(v => <button key={v} className="btn" style={{ padding: '8px 16px', fontSize: 13 }}>{v}</button>)}
                </SettingRow>
                <SettingRow title="强调色 (Accent)" desc="控制界面全局交互高亮色">
                  <div style={{ display: 'flex', gap: 12 }}>
                    {['#E03E3E', '#2ECC71', '#3498DB', '#F1C40F', '#9B59B6'].map(c => (
                      <div key={c} style={{ width: 24, height: 24, borderRadius: '50%', background: c, border: c === '#E03E3E' ? '2px solid #fff' : 'none', cursor: 'pointer' }}></div>
                    ))}
                  </div>
                </SettingRow>
                <SettingRow title="库缩略图尺寸">
                  {['小', '中', '大'].map(v => <button key={v} className="btn" style={{ padding: '8px 16px', fontSize: 13 }}>{v}</button>)}
                </SettingRow>
                <SettingRow title="平滑动效" desc="开启后将启用界面过渡与悬浮反馈动画"><Switch active /></SettingRow>
              </div>
            )}

            {activeTab === '快捷键' && (
              <div className="animate-in">
                <div style={{ marginBottom: 40 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: 'rgba(255,255,255,0.3)', marginBottom: 24, textTransform: 'uppercase' }}>播放控制</div>
                  {[
                    { l: '切换至下一张壁纸', k: ['⌥', '→'] },
                    { l: '切换至上一张壁纸', k: ['⌥', '←'] },
                    { l: '暂停 / 恢复播放', k: ['Space'] },
                    { l: '静音背景音', k: ['⌥', 'M'] }
                  ].map(s => (
                    <ShortcutRow key={s.l} label={s.l} keys={s.k} />
                  ))}
                </div>

                <div style={{ marginBottom: 40 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: 'rgba(255,255,255,0.3)', marginBottom: 24, textTransform: 'uppercase' }}>系统与全局</div>
                  {[
                    { l: '呼出主程序窗口', k: ['⌥', 'P'] },
                    { l: '进入沉浸式预览', k: ['⌘', 'Enter'] },
                    { l: '收藏当前壁纸', k: ['⌘', 'F'] },
                    { l: '打开偏好设置', k: ['⌘', ','] }
                  ].map(s => (
                    <ShortcutRow key={s.l} label={s.l} keys={s.k} />
                  ))}
                </div>
              </div>
            )}
            
            {activeTab === '关于' && (
              <div className="animate-in" style={{ textAlign: 'center', paddingTop: 40 }}>
                <div style={{ position: 'relative', width: 140, height: 140, margin: '0 auto 40px' }}>
                  <div style={{ 
                    position: 'absolute', inset: -30, background: 'radial-gradient(circle, var(--accent) 0%, transparent 70%)', 
                    opacity: 0.2, filter: 'blur(30px)', animation: 'pulse 4s infinite' 
                  }} />
                  <div style={{ 
                    width: '100%', height: '100%', background: '#16181c', borderRadius: 32, 
                    display: 'flex', alignItems: 'center', justifyContent: 'center', 
                    boxShadow: '0 40px 80px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.15)',
                    position: 'relative', zIndex: 1
                  }}>
                     <svg viewBox="0 0 40 40" width="80" height="80"><path d="M20 36C28 36 34 30 34 22C34 14 20 6 20 6C20 6 6 14 6 22C6 30 12 36 20 36Z" fill="#E03E3E"/><path d="M20 2V8" stroke="#2ECC71" strokeWidth="4" strokeLinecap="round"/></svg>
                  </div>
                </div>

                <h3 style={{ fontSize: 48, fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 600, marginBottom: 12 }}>PlumWallPaper</h3>
                <div style={{ display: 'flex', justifyContent: 'center', gap: 12, marginBottom: 32 }}>
                  <span style={{ padding: '4px 12px', background: 'rgba(255,255,255,0.05)', borderRadius: 6, fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Version 5.2.4 (Pro)</span>
                  <span style={{ padding: '4px 12px', background: 'rgba(255,255,255,0.05)', borderRadius: 6, fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Build 2026.04.28</span>
                </div>
                
                <p style={{ fontSize: 16, lineHeight: 1.8, color: 'rgba(255,255,255,0.6)', maxWidth: 500, margin: '0 auto 48px' }}>
                  极致纯净的 macOS 壁纸引擎。采用 Apple Metal 框架构建，为您带来兼具美学与效能的桌面体验。
                </p>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16, maxWidth: 400, margin: '0 auto' }}>
                  <button className="btn" style={{ justifyContent: 'center', height: 44 }}>检查更新</button>
                  <button className="btn" style={{ justifyContent: 'center', height: 44 }}>许可协议</button>
                </div>
              </div>
            )}
          </div>

          <style>{`
            .settings-nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
            .topology-card:hover { transform: scale(1.02); }
            .tag-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
            @keyframes pulse {
              0%, 100% { opacity: 0.15; transform: scale(1); }
              50% { opacity: 0.3; transform: scale(1.15); }
            }
          `}</style>
        </div>
      );
    };

    // --- Root ---

    const App = () => {
      const [view, setView] = useState('home');
      const [showMonitorPopup, setShowMonitorPopup] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [wallpapers, setWallpapers] = useState([]);
      const [selectedWallpaper, setSelectedWallpaper] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [isSearching, setIsSearching] = useState(false);
      const [importProgress, setImportProgress] = useState(null);
      const [toasts, setToasts] = useState([]);
      const [fitMode, setFitMode] = useState('填充');
      const [activeMonitors, setActiveMonitors] = useState([]);
      const [settings, setSettings] = useState({});

      const refreshWallpapers = () => {
        return bridge.call('getWallpapers').then(data => {
          setWallpapers(data);
          if (!selectedWallpaper && data.length > 0) setSelectedWallpaper(data[0]);
        });
      };

      useEffect(() => {
        refreshWallpapers();
        bridge.call('getScreens').then(data => setActiveMonitors(data));
        bridge.call('getSettings').then(data => setSettings(data));
      }, []);

      const updateSetting = (key, value) => {
        const newSettings = { ...settings, [key]: value };
        setSettings(newSettings);
        bridge.call('updateSettings', { settings: newSettings });
      };

      const addToast = (msg) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
      };

      const handleSetWallpaper = (w) => {
        setSelectedWallpaper(w);
        setShowMonitorPopup(true);
      };

      const handleApplyWallpaper = (monitorId) => {
        if (!selectedWallpaper) return;
        const params = { wallpaperId: selectedWallpaper.id };
        if (monitorId !== 'all') params.screenId = monitorId;

        bridge.call('setWallpaper', params).then(() => {
          addToast(monitorId === 'all' ? '已应用到所有显示器' : '已成功设为桌面壁纸');
        }).catch(() => {
          addToast('设置壁纸失败');
        });
      };

      const handleToggleFavorite = (wallpaper) => {
        console.log('[Favorite] Toggling favorite for:', wallpaper.id, wallpaper.name);
        bridge.call('toggleFavorite', { wallpaperId: wallpaper.id }).then((result) => {
          console.log('[Favorite] Toggle result:', result);
          return refreshWallpapers();
        }).then(() => {
          console.log('[Favorite] Refresh complete');
        }).catch((err) => {
          console.error('[Favorite] Error:', err);
          addToast('操作失败: ' + err.message);
        });
      };

      const handleDelete = (wallpaper) => {
        console.log('[Delete] Starting delete for wallpaper:', wallpaper.id, wallpaper.name);
        bridge.call('deleteWallpaper', { wallpaperId: wallpaper.id }).then(() => {
          console.log('[Delete] Delete successful, refreshing...');
          // 如果删除的是当前 hero，重置索引
          if (wallpapers[heroIndex]?.id === wallpaper.id) {
            setHeroIndex(0);
          }
          return refreshWallpapers();
        }).then(() => {
          console.log('[Delete] Refresh complete');
          addToast('已从库中移除');
        }).catch((err) => {
          console.error('[Delete] Error:', err);
          addToast('删除失败: ' + err.message);
        });
      };

      const handleImport = ({ paths, metadata }) => {
        console.log('[Import] Calling bridge.call(importFiles) with paths:', paths, 'metadata:', metadata);
        bridge.call('importFiles', { paths, tag: metadata.tag, favorite: metadata.fav }).then((result) => {
          console.log('[Import] Success, imported:', result);
          addToast('已导入 ' + result.length + ' 个壁纸');
          return refreshWallpapers();
        }).then(() => {
          setShowImportModal(false);
        }).catch((err) => {
          console.error('[Import] Error:', err);
          addToast('导入失败: ' + err.message);
        });
      };

      const handlePreview = (w) => {
        if (w) setSelectedWallpaper(w);
        setView('preview');
      };

      const handleGoToColor = (w) => {
        if (w) setSelectedWallpaper(w);
        setView('color');
      };

      const handleApplyFilter = (wallpaper, preset) => {
        bridge.call('applyFilter', { wallpaperId: wallpaper.id, filter: preset }).then(() => {
          addToast('滤镜已应用');
        });
      };

      const filteredWallpapers = useMemo(() => {
        return wallpapers.filter(w =>
          w.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          (w.tags && w.tags.some(tag => tag.name && tag.name.toLowerCase().includes(searchQuery.toLowerCase())))
        );
      }, [searchQuery, wallpapers]);

      return (
        <div style={{ background: 'var(--bg)', height: '100vh', position: 'relative', overflow: 'hidden' }}>
          {view !== 'color' && view !== 'preview' && (
            <TopNav 
              currentView={view} 
              setView={setView} 
              onSearchClick={() => setIsSearching(true)} 
              onImportClick={() => setShowImportModal(true)}
            />
          )}

          <main style={{ height: '100vh' }}>
            {view === 'home' && wallpapers.length > 0 && (
              <HomePage
                wallpapers={wallpapers}
                onSetWallpaper={handleSetWallpaper}
                fitMode={fitMode}
                onPreview={handlePreview}
                onEditColor={handleGoToColor}
                onToggleFavorite={handleToggleFavorite}
                onDelete={handleDelete}
              />
            )}
            {view === 'library' && (
              <LibraryPage
                wallpapers={filteredWallpapers}
                setView={setView}
                onSetWallpaper={handleSetWallpaper}
                onPreview={handlePreview}
                onEditColor={handleGoToColor}
                onToggleFavorite={handleToggleFavorite}
                onDelete={handleDelete}
              />
            )}
            {view === 'color' && selectedWallpaper && (
              <ColorPage
                wallpaper={selectedWallpaper}
                setView={setView}
                onSave={() => addToast('色彩配置已保存')}
              />
            )}
            {view === 'preview' && selectedWallpaper && (
              <PreviewPage
                wallpaper={selectedWallpaper}
                onClose={() => setView('home')}
              />
            )}
            {view === 'settings' && (
              <SettingsPage
                fitMode={fitMode}
                setFitMode={setFitMode}
                monitors={activeMonitors}
              />
            )}
          </main>

          {/* Import Modal */}
          {showImportModal && (
            <ImportModal 
              onClose={() => setShowImportModal(false)} 
              onStartImport={handleImport}
            />
          )}

          {/* Search Overlay */}
          {isSearching && (
            <div className="animate-in" style={{ 
              position: 'fixed', inset: 0, 
              background: 'rgba(0,0,0,0.8)', 
              backdropFilter: 'blur(80px)', 
              zIndex: 8000, display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 140 
            }} onClick={() => setIsSearching(false)}>
               
               {/* 顶部退出按钮 */}
               <div style={{ position: 'absolute', top: 40, right: 56 }}>
                 <button onClick={() => setIsSearching(false)} className="topbar-btn-v2" style={{ width: 56, height: 56, borderRadius: '50%', background: 'rgba(255,255,255,0.1)', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                   <Icon name="close" size={24} />
                 </button>
               </div>

               <div style={{ width: '100%', maxWidth: 900, padding: '0 40px' }} onClick={e => e.stopPropagation()}>
                  <div style={{ position: 'relative', marginBottom: 60 }}>
                    <input 
                      autoFocus
                      placeholder="探索您的资源库..." 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      onKeyDown={(e) => e.key === 'Escape' && setIsSearching(false)}
                      style={{ 
                        width: '100%', background: 'transparent', border: 'none', 
                        borderBottom: '2px solid rgba(255,255,255,0.1)', color: '#fff', 
                        fontSize: 64, fontFamily: 'var(--font-display)', fontStyle: 'italic',
                        padding: '24px 0', outline: 'none', transition: '0.3s'
                      }} 
                    />
                    <div style={{ position: 'absolute', right: 0, bottom: 32, display: 'flex', gap: 8, alignItems: 'center', opacity: 0.4 }}>
                       <kbd style={{ background: 'rgba(255,255,255,0.1)', padding: '4px 8px', borderRadius: 4, fontSize: 12 }}>ESC</kbd>
                       <span style={{ fontSize: 12 }}>退出搜索</span>
                    </div>
                  </div>

                  <div style={{ marginBottom: 24, fontSize: 13, color: 'rgba(255,255,255,0.3)', textTransform: 'uppercase', letterSpacing: '0.2em' }}>
                    {searchQuery ? `找到 ${filteredWallpapers.length} 个匹配项` : '建议与热门'}
                  </div>

                  <div style={{ 
                    display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 32,
                    maxHeight: '50vh', overflowY: 'auto', paddingRight: 20
                  }} className="no-scrollbar">
                    {filteredWallpapers.map((w, i) => (
                      <div 
                        key={w.id} 
                        onClick={() => { handleSetWallpaper(w); setIsSearching(false); }} 
                        style={{ 
                          cursor: 'pointer', transition: '0.4s cubic-bezier(0.2, 1, 0.3, 1)', 
                          animation: `fadeIn 0.5s forwards ${i * 0.05}s`, opacity: 0 
                        }} 
                        className="search-result-v2"
                      >
                        <div style={{ position: 'relative', aspectRatio: '16/9', borderRadius: 16, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.1)', marginBottom: 12 }}>
                          <img src={w.thumbnailPath} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                          <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.2)', transition: '0.3s' }} className="overlay" />
                        </div>
                        <div style={{ fontSize: 16, fontWeight: 600 }}>{w.name}</div>
                        <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 4 }}>{w.tags && w.tags[0]} · {w.type}</div>
                      </div>
                    ))}
                    {filteredWallpapers.length === 0 && (
                      <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '100px 0', color: 'rgba(255,255,255,0.2)' }}>
                        未找到匹配结果
                      </div>
                    )}
                  </div>
               </div>
            </div>
          )}

          <style>{`
            .search-result-v2:hover { transform: translateY(-8px); }
            .search-result-v2:hover .overlay { background: rgba(0,0,0,0); }
            .search-result-v2:hover img { transform: scale(1.05); transition: 0.8s; }
          `}</style>

          {/* Import Progress Overlay */}
          {importProgress !== null && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', zIndex: 6000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 400, background: '#1a1b1e', padding: 40, borderRadius: 24, border: '1px solid var(--glass-border)', textAlign: 'center' }}>
                <div style={{ fontSize: 18, marginBottom: 24, fontFamily: 'var(--font-display)', fontStyle: 'italic' }}>正在解析壁纸资源...</div>
                <div style={{ height: 4, background: 'rgba(255,255,255,0.1)', borderRadius: 2, overflow: 'hidden', marginBottom: 12 }}>
                  <div style={{ width: `${importProgress}%`, height: '100%', background: 'var(--accent)', transition: '0.1s' }} />
                </div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>{importProgress}% - 请勿关闭应用</div>
              </div>
            </div>
          )}

          {showMonitorPopup && selectedWallpaper && activeMonitors.length > 0 && (
            <MonitorSelector
              wallpaper={selectedWallpaper}
              monitors={activeMonitors}
              onCancel={() => setShowMonitorPopup(false)}
              onApply={(type) => {
                setShowMonitorPopup(false);
                handleApplyWallpaper(type);
              }}
            />
          )}

          {/* Toast System */}
          <div style={{ position: 'fixed', bottom: 32, right: 32, display: 'flex', flexDirection: 'column', gap: 12, zIndex: 7000 }}>
            {toasts.map(t => (
              <div key={t.id} className="animate-in" style={{ background: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(20px)', padding: '12px 24px', borderRadius: 12, border: '1px solid var(--glass-border)', display: 'flex', alignItems: 'center', gap: 12, fontSize: 14, boxShadow: '0 10px 30px rgba(0,0,0,0.2)' }}>
                <div style={{ color: '#2ECC71' }}><Icon name="check" size={16} /></div>
                {t.msg}
              </div>
            ))}
          </div>
          
          <style>{`.search-result:hover { transform: scale(1.05); opacity: 1; transition: 0.3s; }`}</style>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
