<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlumWallPaper v5 - macOS 离线动态壁纸管理</title>
  <!-- 字体引用 -->
  <style>
    @font-face {
      font-family: 'Cormorant Garamond';
      src: url('CormorantGaramond-Italic.ttf') format('truetype');
      font-style: italic;
      font-weight: 300 500;
    }
    @font-face {
      font-family: 'Cormorant Garamond';
      src: url('CormorantGaramond-SemiBoldItalic.ttf') format('truetype');
      font-style: italic;
      font-weight: 600 700;
    }
  </style>

  <!-- React & Babel -->
  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>
  <script src="babel.min.js"></script>
  <script src="bridge.js"></script>

  <style>
    :root {
      --bg: #181A1F;
      --bg-body: #0d0e12;
      --fg: #ffffff;
      --fg-secondary: rgba(255,255,255,0.6);
      --fg-tertiary: rgba(255,255,255,0.4);
      --fg-quaternary: rgba(255,255,255,0.3);
      --accent: #E03E3E;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-heavy: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-display: 'Cormorant Garamond', serif;
      --font-ui: 'Inter', -apple-system, sans-serif;
      --transition-duration: 0.2s;
      --animation-duration: 1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg-body);
      color: var(--fg);
      font-family: var(--font-ui);
      overflow: hidden;
      transition: background var(--transition-duration), color var(--transition-duration);
    }

    /* 隐藏滚动条但保留功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 按钮基础样式 */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--fg);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition-duration);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { background: var(--glass-heavy); transform: translateY(-1px); }
    .btn:active { transform: scale(0.96); transition: 0.08s; opacity: 0.85; }
    .btn-primary { background: rgba(255, 255, 255, 0.12); color: var(--fg); font-weight: 600; border: 1px solid var(--glass-border); backdrop-filter: blur(18px); }
    .btn-primary:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 模拟 macOS 红绿灯 */
    .traffic-lights { display: flex; gap: 8px; }
    .light { width: 12px; height: 12px; border-radius: 50%; }
    .light.red { background: #ff5f57; }
    .light.yellow { background: #febc2e; }
    .light.green { background: #28c840; }

    /* 动画 */
    /* 呼吸光效动画 */
    @keyframes breathing {
      0% { box-shadow: 0 0 5px rgba(224, 62, 62, calc(0.2 * var(--animation-duration))), inset 0 0 0 1px rgba(255,255,255,0.1); }
      50% { box-shadow: 0 0 25px rgba(224, 62, 62, calc(0.5 * var(--animation-duration))), inset 0 0 0 1px rgba(255,255,255,0.2); }
      100% { box-shadow: 0 0 5px rgba(224, 62, 62, calc(0.2 * var(--animation-duration))), inset 0 0 0 1px rgba(255,255,255,0.1); }
    }
    .breathing-glow { animation: breathing calc(3s / var(--animation-duration)) infinite ease-in-out; }

    @keyframes dash-move {
      to { stroke-dashoffset: -16; }
    }
    .animated-dash { animation: dash-move calc(0.8s / var(--animation-duration)) linear infinite; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn calc(0.6s / var(--animation-duration)) cubic-bezier(0.2, 1, 0.3, 1) forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    (function() {
      var frozenW = 0, frozenH = 0;

      window.__freezeForResize = function() {
        if (frozenW) return;
        var root = document.getElementById('root');
        frozenW = window.innerWidth;
        frozenH = window.innerHeight;
        root.style.position = 'fixed';
        root.style.left = '0';
        root.style.top = '0';
        root.style.width = frozenW + 'px';
        root.style.height = frozenH + 'px';
        root.style.transformOrigin = '0 0';
        root.style.overflow = 'hidden';
      };

      window.__unfreezeAfterResize = function() {
        if (!frozenW) return;
        var root = document.getElementById('root');
        root.style.position = '';
        root.style.left = '';
        root.style.top = '';
        root.style.width = '';
        root.style.height = '';
        root.style.transformOrigin = '';
        root.style.transform = '';
        root.style.overflow = '';
        frozenW = 0;
        frozenH = 0;
      };

      window.addEventListener('resize', function() {
        if (!frozenW) return;
        var root = document.getElementById('root');
        var sx = window.innerWidth / frozenW;
        var sy = window.innerHeight / frozenH;
        root.style.transform = 'scale(' + sx + ',' + sy + ')';
      });
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Utility Functions ---
    const formatSize = (bytes) => {
      if (!bytes) return '-';
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + 'GB';
      if (bytes >= 1048576) return (bytes / 1048576).toFixed(0) + 'MB';
      return (bytes / 1024).toFixed(0) + 'KB';
    };

    const formatDuration = (seconds) => {
      if (!seconds || seconds <= 0) return '-';
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = Math.floor(seconds % 60).toString().padStart(2, '0');
      return m + ':' + s;
    };

    const n = (val, def) => (typeof val === 'number' ? val : def);

    const getFilterCSS = (fp) => {
      if (!fp) return 'none';
      return 'hue-rotate(' + n(fp.hue,0) + 'deg) saturate(' + n(fp.saturation,100) + '%) brightness(' + n(fp.brightness,100) + '%) contrast(' + n(fp.contrast,100) + '%) grayscale(' + n(fp.grayscale,0) + '%) invert(' + n(fp.invert,0) + '%) brightness(' + n(fp.exposure,100) + '%)';
    };

    const BUILTIN_PRESETS = [
      { id: 'portra400', name: '柯达 Portra 400', hue: 0, saturation: 80, brightness: 90, contrast: 110, blur: 0, grayscale: 10, invert: 0, exposure: 105, grain: 15, vignette: 20 },
      { id: 'superia', name: '富士 Superia', hue: 10, saturation: 70, brightness: 105, contrast: 105, blur: 0, grayscale: 0, invert: 0, exposure: 100, grain: 0, vignette: 10 },
      { id: 'teal-orange', name: '电影青橙', hue: 0, saturation: 120, brightness: 110, contrast: 115, blur: 0, grayscale: 0, invert: 0, exposure: 115, grain: 0, vignette: 0 },
      { id: 'bw-film', name: '黑白胶片', hue: 0, saturation: 0, brightness: 100, contrast: 120, blur: 0, grayscale: 100, invert: 0, exposure: 110, grain: 20, vignette: 40 },
    ];

    // --- Components ---

    const Icon = ({ name, size = 18 }) => {
      const icons = {
        search: <path d="M19 19l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />,
        plus: <path d="M12 5v14M5 12h14" />,
        settings: <><circle cx="12" cy="12" r="3" /><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" /></>,
        heart: <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />,
        'heart-filled': <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />,
        check: <path d="M20 6L9 17l-5-5" />,
        close: <path d="M18 6L6 18M6 6l12 12" />,
        play: <path d="M5 3l14 9-14 9V3z" />,
        image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><circle cx="8.5" cy="8.5" r="1.5" /><path d="M21 15l-5-5L5 21" /></>,
        monitor: <><rect x="2" y="3" width="20" height="14" rx="2" /><path d="M8 21h8M12 17v4" /></>,
        sliders: <path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6" />,
        droplet: <path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" />,
        edit: <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />,
        trash: <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />,
        'volume-2': <><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" /></>,
        'volume-x': <><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><line x1="23" y1="9" x2="17" y2="15" /><line x1="17" y1="9" x2="23" y2="15" /></>,
        'volume-1': <><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 010 7.07" /></>,
      };
      const isFilled = name === 'heart-filled';
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={isFilled ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth={isFilled ? '0' : '2'} strokeLinecap="round" strokeLinejoin="round">
          {icons[name]}
        </svg>
      );
    };

    const MonitorSelector = ({ onCancel, onApply, wallpaper, monitors }) => {
      const [selectedMonitor, setSelectedMonitor] = useState(monitors.length > 0 ? monitors[0].id : null);

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(40px)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40 }}>
          <div className="animate-in" style={{ background: '#1a1b1e', width: '100%', maxWidth: 740, borderRadius: 32, border: '1px solid rgba(255,255,255,0.1)', overflow: 'hidden', boxShadow: '0 50px 100px rgba(0,0,0,0.6)' }}>
            <div style={{ padding: '32px 40px', borderBottom: '1px solid rgba(255,255,255,0.08)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <h2 style={{ fontSize: 26, fontStyle: 'italic', fontWeight: 600, fontFamily: 'var(--font-display)', letterSpacing: '-0.02em' }}>选择目标显示器</h2>
                <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', marginTop: 4 }}>点击设备卡片以分配壁纸资源</p>
              </div>
              <button onClick={onCancel} className="btn" style={{ borderRadius: '50%', width: 40, height: 40, padding: 0, justifyContent: 'center' }}><Icon name="close" /></button>
            </div>

            <div style={{ padding: '48px 60px' }}>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 32, marginBottom: 40 }}>
                {monitors.map(m => (
                  <div key={m.id}
                    onClick={() => setSelectedMonitor(m.id)}
                    className="screen-card-v2"
                    style={{
                      border: '2px solid ' + (selectedMonitor === m.id ? 'var(--accent)' : 'rgba(255,255,255,0.05)'),
                      borderRadius: 24, padding: 24, background: selectedMonitor === m.id ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)',
                      cursor: 'pointer', position: 'relative', transition: '0.4s cubic-bezier(0.2, 1, 0.3, 1)',
                      textAlign: 'center'
                    }}>

                    {/* Aura Glow */}
                    {selectedMonitor === m.id && (
                      <div style={{ position: 'absolute', inset: -15, background: 'radial-gradient(circle, var(--accent) 0%, transparent 70%)', opacity: 0.15, zIndex: -1, filter: 'blur(20px)' }} />
                    )}

                    <div style={{ aspectRatio: '16/10', background: '#000', borderRadius: 12, marginBottom: 20, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.1)', position: 'relative' }}>
                       <img src={wallpaper.thumbnailPath} style={{ width: '100%', height: '100%', objectFit: 'cover', opacity: selectedMonitor === m.id ? 1 : 0.4, transition: '0.6s', filter: getFilterCSS(wallpaper.filterPreset) }} />
                       <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: selectedMonitor === m.id ? 0 : 0.4 }}>
                         <Icon name="monitor" size={48} />
                       </div>
                    </div>

                    <div style={{ fontSize: 16, fontWeight: 700, color: selectedMonitor === m.id ? '#fff' : 'rgba(255,255,255,0.6)' }}>{m.name}</div>
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 6 }}>{m.resolution} {m.isMain && '· 主屏幕'}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ padding: '32px 48px', background: 'rgba(255,255,255,0.02)', borderTop: '1px solid rgba(255,255,255,0.08)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
               <button className="btn" style={{ background: 'transparent', color: 'var(--accent)', fontSize: 13, fontWeight: 600 }} onClick={() => onApply('all')}>应用于所有显示器</button>
               <div style={{ display: 'flex', gap: 16 }}>
                 <button className="btn" style={{ padding: '10px 24px' }} onClick={onCancel}>取消</button>
                 <button className="btn-primary btn" style={{ padding: '10px 32px' }} onClick={() => onApply(selectedMonitor)}>确认分配</button>
               </div>
            </div>

            <style>{`
              .screen-card-v2:hover { transform: translateY(-8px); background: rgba(255,255,255,0.06); }
              .screen-card-v2:hover img { opacity: 0.8 !important; }
            `}</style>
          </div>
        </div>
      );
    };

    const PanoramaPreview = ({ onCancel, onApply, wallpaper, monitors }) => {
      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(40px)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40 }}>
          <div className="animate-in" style={{ background: '#1a1b1e', width: '100%', maxWidth: 900, borderRadius: 32, border: '1px solid rgba(255,255,255,0.1)', overflow: 'hidden', boxShadow: '0 50px 100px rgba(0,0,0,0.6)' }}>
            <div style={{ padding: '32px 40px', borderBottom: '1px solid rgba(255,255,255,0.08)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <h2 style={{ fontSize: 26, fontStyle: 'italic', fontWeight: 600, fontFamily: 'var(--font-display)', letterSpacing: '-0.02em' }}>全景拼接预览</h2>
                <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)', marginTop: 4 }}>壁纸将横跨所有显示器连续展示</p>
              </div>
              <button onClick={onCancel} className="btn" style={{ borderRadius: '50%', width: 40, height: 40, padding: 0, justifyContent: 'center' }}><Icon name="close" /></button>
            </div>

            <div style={{ padding: '48px 60px' }}>
              <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end', justifyContent: 'center', marginBottom: 40, position: 'relative' }}>
                {monitors.map((m, idx) => (
                  <div key={m.id} style={{ position: 'relative', textAlign: 'center' }}>
                    <div style={{
                      width: m.isMain ? 180 : 140,
                      aspectRatio: '16/10',
                      background: '#000',
                      borderRadius: 12,
                      border: '2px solid ' + (m.isMain ? 'var(--accent)' : 'rgba(255,255,255,0.1)'),
                      overflow: 'hidden',
                      position: 'relative',
                      boxShadow: m.isMain ? '0 0 40px rgba(224,62,62,0.25)' : '0 10px 30px rgba(0,0,0,0.5)'
                    }}>
                      <img src={wallpaper.thumbnailPath} style={{
                        width: '100%',
                        height: '100%',
                        objectFit: 'cover',
                        objectPosition: `${(idx / (monitors.length - 1)) * 100}% center`,
                        filter: getFilterCSS(wallpaper.filterPreset)
                      }} />
                      <div style={{ position: 'absolute', top: 8, right: 8, fontSize: 9, background: 'rgba(0,0,0,0.6)', padding: '2px 6px', borderRadius: 4, fontWeight: 700 }}>{idx + 1}</div>
                    </div>
                    <div style={{ fontSize: 12, fontWeight: 600, marginTop: 12 }}>{m.name}</div>
                    <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)', marginTop: 4 }}>{m.resolution}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 16, padding: 20, border: '1px solid rgba(255,255,255,0.05)', textAlign: 'center' }}>
                <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)', lineHeight: 1.6 }}>
                  <Icon name="info" size={16} style={{ verticalAlign: 'middle', marginRight: 6 }} />
                  全景模式将壁纸横向拉伸并裁切，使其连续跨越所有显示器。当前为预览效果，实际渲染将根据显示器物理排列自动调整。
                </div>
              </div>
            </div>

            <div style={{ padding: '32px 48px', background: 'rgba(255,255,255,0.02)', borderTop: '1px solid rgba(255,255,255,0.08)', display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 16 }}>
              <button className="btn" style={{ padding: '10px 24px' }} onClick={onCancel}>取消</button>
              <button className="btn-primary btn" style={{ padding: '10px 32px' }} onClick={() => onApply('all')}>确认应用</button>
            </div>
          </div>
        </div>
      );
    };

    const TopNav = ({ currentView, setView, onSearchClick, onImportClick }) => (
      <nav style={{ 
        position: 'absolute', top: 0, left: 0, right: 0, height: 110, padding: '0 56px 0 80px', 
        display: 'flex', alignItems: 'center', gap: 32, zIndex: 1000,
        background: 'linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 60%, transparent 100%)',
        WebkitAppRegion: 'drag'
      }}>
        <div className="branding" onClick={() => setView('home')} style={{ 
          display: 'flex', alignItems: 'center', gap: 16, cursor: 'pointer', 
          transition: '0.4s cubic-bezier(0.2, 1, 0.3, 1)',
          WebkitAppRegion: 'no-drag'
        }}>
          <div style={{
            width: 44, height: 44, background: '#16181c', borderRadius: 12,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 10px 25px rgba(0,0,0,0.3), inset 0 0 0 0.5px rgba(255,255,255,0.15)',
            position: 'relative'
          }}>
            <svg viewBox="0 0 40 40" width="30" height="30">
              <defs>
                <radialGradient id="plumGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                  <stop offset="0%" stopColor="#ff4d4d" />
                  <stop offset="100%" stopColor="#E03E3E" />
                </radialGradient>
              </defs>
              <path d="M20 36C28 36 34 30 34 22C34 14 20 6 20 6C20 6 6 14 6 22C6 30 12 36 20 36Z" fill="url(#plumGrad)"/>
              <path d="M20 2V8" stroke="#2ECC71" strokeWidth="3" strokeLinecap="round"/>
            </svg>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1 }}>
            <span style={{ fontSize: 26, fontWeight: 700, fontFamily: 'var(--font-display)', fontStyle: 'italic', color: '#fff', letterSpacing: '-0.02em' }}>Plum</span>
            <span style={{ fontSize: 9, fontWeight: 900, textTransform: 'uppercase', color: 'rgba(255,255,255,0.3)', letterSpacing: '4px', marginTop: 4 }}>WallPaper</span>
          </div>
        </div>

        {/* 灵动分段控制器 */}
        <div style={{ display: 'flex', position: 'relative', padding: 2, marginLeft: 16, WebkitAppRegion: 'no-drag' }}>
          {['home', 'library'].map(v => (
            <button key={v} onClick={() => setView(v)} style={{ 
              position: 'relative', zIndex: 1, padding: '10px 24px', borderRadius: 12, border: 'none', 
              background: 'transparent', color: currentView === v ? '#fff' : 'rgba(255,255,255,0.4)', 
              fontSize: 14, fontWeight: 600, cursor: 'pointer', transition: '0.4s', display: 'flex', alignItems: 'center', gap: 8
            }}>
              {currentView === v && (
                <div style={{ position: 'absolute', inset: 0, background: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(24px)', borderRadius: 12, zIndex: -1, boxShadow: '0 4px 15px rgba(0,0,0,0.2)' }} className="animate-in" />
              )}
              <Icon name={v === 'home' ? 'monitor' : 'image'} size={14} />
              {v === 'home' ? '首页' : '壁纸库'}
            </button>
          ))}
        </div>

        {/* 简洁功能按钮组 */}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 12, WebkitAppRegion: 'no-drag' }}>
          {[
            { id: 'search', icon: 'search', action: onSearchClick },
            { id: 'import', icon: 'plus', action: onImportClick },
            { id: 'settings', icon: currentView === 'settings' ? 'close' : 'settings', action: () => setView(currentView === 'settings' ? 'home' : 'settings'), active: currentView === 'settings' }
          ].map(btn => (
            <button 
              key={btn.id}
              onClick={btn.action} 
              className="topbar-btn-v3"
              style={{ 
                width: 42, height: 42, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', 
                background: btn.active ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.03)', 
                border: '1px solid rgba(255,255,255,0.08)', cursor: 'pointer', color: btn.active ? '#fff' : 'rgba(255,255,255,0.4)', 
                transition: '0.3s cubic-bezier(0.2, 1, 0.3, 1)',
                backdropFilter: 'blur(10px)'
              }}
            >
              <Icon name={btn.icon} size={20} />
            </button>
          ))}
        </div>

        <style>{`
          .topbar-btn-v3:hover { background: rgba(255,255,255,0.08); color: #fff; }

    const PreviewPage = ({ wallpaper, onClose, settings }) => {
      const [isMuted, setIsMuted] = useState(true);
      const [volume, setVolume] = useState(() => (wallpaper.volumeOverride != null ? wallpaper.volumeOverride : 100));
      const [showVolSlider, setShowVolSlider] = useState(false);
      const [progress, setProgress] = useState(0);
      const [duration, setDuration] = useState(0);
      const [currentTime, setCurrentTime] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const videoRef = useRef(null);

      useEffect(() => {
        if (videoRef.current) {
          videoRef.current.muted = isMuted;
          const globalVol = (settings?.globalVolume ?? 50) / 100;
          videoRef.current.volume = (volume / 100) * globalVol;
        }
      }, [isMuted, volume]);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        const onTime = () => {
          if (!isDragging) {
            setCurrentTime(video.currentTime);
            setProgress(video.duration > 0 ? video.currentTime / video.duration : 0);
          }
        };
        const onMeta = () => setDuration(video.duration);
        video.addEventListener('timeupdate', onTime);
        video.addEventListener('loadedmetadata', onMeta);
        if (video.duration) setDuration(video.duration);
        return () => {
          video.removeEventListener('timeupdate', onTime);
          video.removeEventListener('loadedmetadata', onMeta);
        };
      }, [isDragging]);

      const fmtTime = (s) => {
        if (!s || isNaN(s) || !isFinite(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;

      return (
      <div className="animate-in" style={{ position: 'fixed', inset: 0, background: '#000', zIndex: 5000, display: 'flex', flexDirection: 'column' }}>

          <div style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(20px)', padding: '8px 24px', borderRadius: 100, border: '1px solid rgba(255,255,255,0.1)', fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.6)' }}>Immersive Preview</div>
          <button onClick={onClose} className="btn" style={{ borderRadius: '50%', width: 44, height: 44, justifyContent: 'center', background: 'rgba(255,255,255,0.1)', border: 'none', backdropFilter: 'blur(10px)' }}><Icon name="close" /></button>
        </div>
        {wallpaper.type === 'video' ? (

        ) : (
          <img src={wallpaper.filePath} style={{ width: '100%', height: '100%', objectFit: 'cover', filter: getFilterCSS(wallpaper.filterPreset) }} />

        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 280, background: 'linear-gradient(to top, rgba(0,0,0,0.9), transparent)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 40px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
            <span style={{ padding: '4px 12px', background: 'var(--accent)', borderRadius: 6, fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.1em' }}>{wallpaper.tags && wallpaper.tags[0] ? (wallpaper.tags[0].name || String(wallpaper.tags[0])) : ''}</span>
            {wallpaper.isFavorite && <Icon name="heart-filled" size={14} color="var(--accent)" />}
          </div>
          <h2 style={{ fontSize: 48, fontFamily: 'var(--font-display)', fontStyle: 'italic', marginBottom: 12, letterSpacing: '-0.02em' }}>{wallpaper.name}</h2>
          <p style={{ color: 'rgba(255,255,255,0.4)', fontSize: 14, fontWeight: 300, letterSpacing: '0.05em' }}>
            {wallpaper.resolution} · {wallpaper.type} · {formatSize(wallpaper.fileSize)} {wallpaper.frameRate ? `· ${wallpaper.frameRate}fps` : ''} {formatDuration(wallpaper.duration) !== '-' && `· ${formatDuration(wallpaper.duration)}`}
          </p>
          {wallpaper.type === 'video' && duration > 0 && isFinite(duration) && (
            <div style={{
              width: '100%', maxWidth: 600, margin: '16px auto 0',
              display: 'flex', alignItems: 'center', gap: 10
            }}>
              <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', fontFamily: 'monospace', minWidth: 36, textAlign: 'right' }}>

              </span>
              <div style={{
                flex: 1, height: 4, background: 'rgba(255,255,255,0.1)', borderRadius: 2,
                cursor: 'pointer', position: 'relative'

                onClick={e => {
                  const rect = e.currentTarget.getBoundingClientRect();
                  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                  videoRef.current.currentTime = pct * duration;
                  setProgress(pct);
                  setCurrentTime(pct * duration);
                }}
                onMouseDown={e => {
                  setIsDragging(true);
                  const bar = e.currentTarget;
                  const onMove = (ev) => {
                    const rect = bar.getBoundingClientRect();
                    const pct = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
                    setProgress(pct);
                    setCurrentTime(pct * duration);
                  };
                  const onUp = (ev) => {
                    const rect = bar.getBoundingClientRect();
                    const pct = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
                    videoRef.current.currentTime = pct * duration;
                    setIsDragging(false);
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                  };
                  document.addEventListener('mousemove', onMove);
                  document.addEventListener('mouseup', onUp);
                }}
              >
                <div style={{

    const HomePage = ({ onSetWallpaper, wallpapers, fitMode, onPreview, onEditColor, onToggleFavorite, onDelete, onViewAll }) => {
      const [heroIndex, setHeroIndex] = useState(0);
      const [contextMenu, setContextMenu] = useState(null);

      // 智能推荐：计算 Hero 区展示的壁纸
      const heroWallpapers = useMemo(() => {
        if (wallpapers.length === 0) return [];

        // 评分函数
        const scoreWallpaper = (w) => {
          let score = 0;

          // 1. 收藏 +50 分（最高优先级）
          if (w.isFavorite) score += 50;

          // 2. 最近使用 +30 分
          if (w.lastUsedDate) {
            const daysSinceUsed = (Date.now() - new Date(w.lastUsedDate).getTime()) / (1000 * 60 * 60 * 24);
            if (daysSinceUsed < 7) score += 30;
            else if (daysSinceUsed < 30) score += 15;
          }

          // 3. 最近添加 +20 分
          const daysSinceImport = (Date.now() - new Date(w.importDate).getTime()) / (1000 * 60 * 60 * 24);
          if (daysSinceImport < 7) score += 20;
          else if (daysSinceImport < 30) score += 10;

          // 4. 高分辨率 +15 分（视觉冲击力）
          const resMatch = w.resolution.match(/(\d+)×(\d+)/);
          if (resMatch) {
            const width = parseInt(resMatch[1]);
            const height = parseInt(resMatch[2]);
            const pixels = width * height;
            if (pixels >= 3840 * 2160) score += 15; // 4K+
            else if (pixels >= 2560 * 1440) score += 10; // 2K+
            else if (pixels >= 1920 * 1080) score += 5; // 1080p+
          }

          // 5. 视频 + 有音频 +10 分（沉浸感）
          if (w.type === 'video' && w.hasAudio) score += 10;

          // 6. 高帧率视频 +8 分（流畅度）
          if (w.frameRate && w.frameRate >= 60) score += 8;
          else if (w.frameRate && w.frameRate >= 30) score += 4;

          // 7. 文件大小适中 +5 分（质量平衡）
          const sizeMB = w.fileSize / (1024 * 1024);
          if (sizeMB >= 10 && sizeMB <= 500) score += 5;
          else if (sizeMB < 1) score -= 5; // 太小可能质量差

          // 8. 有标签 +3 分（分类清晰）
          if (w.tags && w.tags.length > 0) score += 3;

          return score;
        };

        // 计算所有壁纸的分数
        const scored = wallpapers.map(w => ({ wallpaper: w, score: scoreWallpaper(w) }));

        // 按分数排序
        scored.sort((a, b) => b.score - a.score);

        // 取前 15 个，但要保证标签多样性
        const selected = [];
        const usedTags = new Set();
        const maxPerTag = 3;

        for (const item of scored) {
          if (selected.length >= 15) break;

          const w = item.wallpaper;
          const wTags = (w.tags || []).map(t => t.name || String(t));

          // 检查标签多样性
          const tagCounts = wTags.map(tag =>
            selected.filter(s =>
              (s.tags || []).some(t => (t.name || String(t)) === tag)
            ).length
          );

          const maxTagCount = Math.max(0, ...tagCounts);

          // 如果这个壁纸的标签还没超过限制，或者它是收藏/最近使用，就加入
          if (maxTagCount < maxPerTag || item.score >= 50) {
            selected.push(w);
          }
        }

        // 如果不足 8 个，补充高分壁纸
        if (selected.length < 8) {
          for (const item of scored) {
            if (selected.length >= 15) break;
            if (!selected.includes(item.wallpaper)) {
              selected.push(item.wallpaper);
            }
          }
        }

        return selected.slice(0, 15);
      }, [wallpapers]);

      // heroIndex 越界保护
      useEffect(() => {
        if (heroWallpapers.length > 0 && heroIndex >= heroWallpapers.length) {
          setHeroIndex(0);
        }
      }, [heroWallpapers.length]);

      const hero = heroWallpapers[heroIndex] || heroWallpapers[0];
      const scrollContainerRef = useRef(null);
      const heroVideoRef = useRef(null);

        return sections;

      const handleHeroThumbClick = (index) => {

      const handleContextMenu = (e, w) => {
        e.preventDefault();
        setContextMenu({ x: e.clientX, y: e.clientY, w });
      };

      useEffect(() => {
        const hide = () => setContextMenu(null);
        window.addEventListener('click', hide);
        return () => window.removeEventListener('click', hide);
      }, []);

      const onMouseDown = (e) => {
        const el = e.currentTarget;
        setDragState({ isDragging: true, startX: e.pageX - el.offsetLeft, scrollLeft: el.scrollLeft, moved: false });
      };

      const onMouseMove = (e) => {
        if (!dragState.isDragging) return;
        e.preventDefault();
        const el = e.currentTarget;
        const x = e.pageX - el.offsetLeft;
        const walk = (x - dragState.startX) * 1.5;
        el.scrollLeft = dragState.scrollLeft - walk;
        if (Math.abs(walk) > 5) setDragState(prev => ({ ...prev, moved: true }));
      };

      const onMouseUp = () => {
        if (dragState.isDragging) {
          setTimeout(() => setDragState({ isDragging: false, startX: 0, scrollLeft: 0, moved: false }), 50);

      return (
        <div ref={scrollContainerRef} className="no-scrollbar" style={{ height: '100vh', overflowY: 'auto', overflowX: 'hidden', scrollBehavior: 'smooth', background: '#0d0e12' }}>

            <div style={{ position: 'absolute', inset: 0, background: '#000' }}>

              }} />

              <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(13,14,18,0) 40%, rgba(13,14,18,0.8) 75%, #0d0e12 100%)', zIndex: 3 }} />

            <div className="animate-in" style={{ position: 'relative', zIndex: 10, height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', padding: '0 80px 140px' }}>

              <h1 style={{

                fontFamily: 'var(--font-display)',

                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="sliders" size={14} /> {formatSize(hero.fileSize)}</div>
                {formatDuration(hero.duration) !== '-' && <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="play" size={14} /> {formatDuration(hero.duration)}</div>}
                {hero.frameRate && <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="zap" size={14} /> {hero.frameRate}fps</div>}
                {hero.hasAudio && <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="volume-2" size={14} /> Audio</div>}

                {hero.type === 'video' && hero.hasAudio && (
                  <button className="btn" style={{ width: 56, height: 56, borderRadius: 14, justifyContent: 'center', padding: 0, background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(20px)', color: 'rgba(255,255,255,0.8)' }} onClick={() => setHeroMuted(!heroMuted)}>
                    <Icon name={heroMuted ? 'volume-x' : 'volume-2'} size={18} />
                  </button>
                )}
              </div>
            </div>

            <div onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp} className="no-scrollbar" style={{ position: 'absolute', bottom: 40, left: 80, right: 0, overflowX: 'auto', zIndex: 20, cursor: dragState.isDragging ? 'grabbing' : 'grab', userSelect: 'none' }}>

                      <div style={{

                        boxShadow: '0 10px 30px rgba(0,0,0,0.2)',

                      }} className="card-container">
                        <img src={w.thumbnailPath} style={{ width: '100%', height: '100%', objectFit: 'cover', transition: '0.8s cubic-bezier(0.2, 1, 0.3, 1)', filter: getFilterCSS(w.filterPreset) }} className="card-img" />

                        <div style={{ position: 'absolute', top: 16, right: 16, display: 'flex', gap: 6, alignItems: 'center' }}>

                            <div style={{ color: 'rgba(255,255,255,0.7)', filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.4))' }}>
                              <Icon name="volume-2" size={14} />

                            <div style={{ color: 'var(--accent)', filter: 'drop-shadow(0 4px 10px rgba(0,0,0,0.35))' }}>
                              <Icon name="heart-filled" size={18} />
                            </div>
                          )}
                        </div>

                        <div style={{ position: 'absolute', bottom: 16, left: 16, right: 16, display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'flex-end', maxWidth: 'calc(100% - 32px)' }}>
                           {w.filterPreset && <div style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(12px)', border: '1px solid rgba(255,255,255,0.1)', padding: '5px 10px', borderRadius: 10, fontSize: 10, color: 'rgba(255,255,255,0.7)', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="droplet" size={9} />{w.filterPreset.name}</div>}
                           {w.frameRate && <div style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(12px)', border: '1px solid rgba(255,255,255,0.1)', padding: '5px 10px', borderRadius: 10, fontSize: 10, color: 'rgba(255,255,255,0.7)', fontWeight: 600 }}>{w.frameRate}fps</div>}
                           <div style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(12px)', border: '1px solid rgba(255,255,255,0.1)', padding: '5px 10px', borderRadius: 10, fontSize: 10, color: 'rgba(255,255,255,0.7)', fontWeight: 600 }}>{formatSize(w.fileSize)}</div>
                           {formatDuration(w.duration) !== '-' && <div style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(12px)', border: '1px solid rgba(255,255,255,0.1)', padding: '5px 10px', borderRadius: 10, fontSize: 10, color: 'rgba(255,255,255,0.7)', fontWeight: 600 }}>{formatDuration(w.duration)}</div>}
                        </div>
                      </div>
                      <div style={{ padding: '0 4px' }}>
                        <div style={{ fontWeight: 600, fontSize: 17, marginBottom: 4, color: 'rgba(255,255,255,0.9)' }}>{w.name}</div>
                        <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.3)', display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span>{w.resolution}</span>
                          <span style={{ width: 3, height: 3, borderRadius: '50%', background: 'rgba(255,255,255,0.2)' }} />
                          <span>{w.type}</span>
                          {w.frameRate && <><span style={{ width: 3, height: 3, borderRadius: '50%', background: 'rgba(255,255,255,0.2)' }} /><span>{w.frameRate}fps</span></>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <style>{`
            .card-v2:hover .card-container { 
              transform: translateY(-12px) scale(1.03); 
              box-shadow: 0 40px 80px rgba(0,0,0,0.6);
              border-color: rgba(255,255,255,0.25);
            }
            .card-v2:hover .aura-glow { opacity: 0.3; transform: scale(1.2); }
            .card-v2:hover .card-img { transform: scale(1.1); }
            .view-all:hover { color: #fff !important; }
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .menu-item:hover { background: var(--accent); color: #fff; }
          `}</style>

          {contextMenu && (
            <div style={{ 
              position: 'fixed', top: contextMenu.y, left: contextMenu.x, width: 220, 
              background: 'rgba(20,21,26,0.85)', backdropFilter: 'blur(40px)', 
              borderRadius: 16, border: '1px solid var(--accent)', 
              padding: '8px', zIndex: 9000, 
              boxShadow: '0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05)',
              animation: 'fadeIn 0.2s cubic-bezier(0.2, 1, 0.3, 1)'
            }}>
              <div style={{ padding: '10px 14px 12px', borderBottom: '1px solid rgba(255,255,255,0.06)', marginBottom: 8 }}>
                <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.15em' }}>Asset Operations</div>
              </div>
              {[
                { l: '设为壁纸', i: 'monitor', a: () => onSetWallpaper(contextMenu.w) },
                { l: '进入色彩调节', i: 'sliders', a: () => onEditColor(contextMenu.w) },
                { l: '全屏预览', i: 'search', a: () => onPreview(contextMenu.w) },
                { l: contextMenu.w.isFavorite ? '取消收藏' : '收藏该壁纸', i: contextMenu.w.isFavorite ? 'heart-filled' : 'heart', a: () => { onToggleFavorite && onToggleFavorite(contextMenu.w); setContextMenu(null); } },
                { type: 'sep' },
                { l: '在访达中显示', i: 'monitor', a: () => { bridge.call('revealInFinder', { wallpaperId: contextMenu.w.id }); setContextMenu(null); } },
                { l: '移除该资源', i: 'close', a: () => onDelete && onDelete(contextMenu.w), c: '#ff4d4d' },
              ].map((it, idx) => it.type === 'sep' ? (
                <div key={idx} style={{ height: 1, background: 'rgba(255,255,255,0.08)', margin: '4px 8px' }} />

                  <Icon name={it.i} size={14} />

                </div>

            </div>
          )}
        </div>
      );
    };

    const LibraryPage = ({ wallpapers, setView, onSetWallpaper, onEditColor, onToggleFavorite, onDelete, initialFilter, sortBy, sortOrder, onChangeSortBy, onToggleSortOrder, settings: libSettings }) => {
      const [contextMenu, setContextMenu] = useState(null);
      const [showTagManager, setShowTagManager] = useState(false);
      const [showSortMenu, setShowSortMenu] = useState(false);
      const sortLabels = { importDate: '导入时间', name: '名称', fileSize: '文件大小', resolution: '分辨率', favorite: '收藏优先' };
      const [activeFilter, setActiveFilter] = useState(initialFilter || '全部');

      const availableFilters = useMemo(() => {
        const tagNames = Array.from(new Set(
          wallpapers.flatMap(w => (w.tags || []).map(tag => tag.name || String(tag))).filter(Boolean)
        ));
        const frameRates = Array.from(new Set(
          wallpapers.map(w => w.frameRate).filter(Boolean)
        )).sort((a, b) => a - b).map(r => r + 'fps');
        return ['全部', '收藏', '视频', 'HEIC', ...frameRates, ...tagNames];
      }, [wallpapers]);

      const filteredWallpapers = useMemo(() => {
        if (activeFilter === '全部') return wallpapers;
        if (activeFilter === '收藏') return wallpapers.filter(w => w.isFavorite);
        if (activeFilter === '视频') return wallpapers.filter(w => w.type === 'video');
        if (activeFilter === 'HEIC') return wallpapers.filter(w => w.type === 'heic');
        if (activeFilter.endsWith('fps')) {
          const rate = parseInt(activeFilter);
          return wallpapers.filter(w => w.frameRate === rate);
        }
        return wallpapers.filter(w => w.tags && w.tags.some(tag => (tag.name || String(tag)) === activeFilter));
      }, [activeFilter, wallpapers]);

        setContextMenu({ x: e.clientX, y: e.clientY, w });

                  transition: '0.5s cubic-bezier(0.2, 1, 0.3, 1)'
                }} className="card-container">
                   <img src={w.thumbnailPath} style={{ width: '100%', height: '100%', objectFit: 'cover', transition: '0.8s', filter: getFilterCSS(w.filterPreset) }} className="card-img" />

                   {/* 悬浮覆盖层 */}
                   <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(0,0,0,0.4), transparent)', opacity: 0, transition: '0.3s' }} className="card-overlay" />

                   <div style={{ position: 'absolute', bottom: 12, right: 12, display: 'flex', gap: 6 }}>
                     {w.filterPreset && <div style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(10px)', border: '1px solid rgba(255,255,255,0.1)', padding: '4px 10px', borderRadius: 8, fontSize: 9, color: 'rgba(255,255,255,0.8)', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="droplet" size={8} />{w.filterPreset.name}</div>}
                     <div style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(10px)', border: '1px solid rgba(255,255,255,0.1)', padding: '4px 10px', borderRadius: 8, fontSize: 10, color: 'rgba(255,255,255,0.8)', fontWeight: 600 }}>{formatSize(w.fileSize)}</div>
                   </div>

                   {w.type === 'video' && (
                     <div style={{ position: 'absolute', top: 12, right: 12, background: 'var(--accent)', color: '#fff', width: 28, height: 28, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 4px 10px rgba(0,0,0,0.3)' }}>
                       <Icon name="play" size={14} />
                     </div>
                   )}

                   <div style={{ position: 'absolute', top: 12, left: 12, display: 'flex', gap: 6, alignItems: 'center' }}>
                     {w.isFavorite && (
                       <div style={{ color: 'var(--accent)', filter: 'drop-shadow(0 4px 10px rgba(0,0,0,0.35))' }}>
                         <Icon name="heart-filled" size={18} />
                       </div>
                     )}
                     {w.hasAudio && (
                       <div style={{ color: 'rgba(255,255,255,0.75)', filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.4))' }}>
                         <Icon name="volume-2" size={14} />
                       </div>
                     )}
                   </div>
                </div>
                <div style={{ padding: '0 4px' }}>
                  <div style={{ fontWeight: 600, fontSize: 16, color: 'rgba(255,255,255,0.9)' }}>{w.name}</div>
                  <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.25)', marginTop: 4, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span>{w.resolution} · {w.type}</span>
                    <span style={{ textTransform: 'uppercase', letterSpacing: '0.05em', background: 'rgba(255,255,255,0.05)', padding: '2px 6px', borderRadius: 4 }}>{w.tags && w.tags[0] ? (w.tags[0].name || String(w.tags[0])) : ''}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {contextMenu && (
            <div style={{ 
              position: 'fixed', top: contextMenu.y, left: contextMenu.x, width: 220, 
              background: 'rgba(20,21,26,0.85)', backdropFilter: 'blur(40px)', 
              borderRadius: 16, border: '1px solid var(--accent)', 
              padding: '8px', zIndex: 9000, 
              boxShadow: '0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05)',
              animation: 'fadeIn 0.2s cubic-bezier(0.2, 1, 0.3, 1)'
            }}>
              <div style={{ padding: '10px 14px 12px', borderBottom: '1px solid rgba(255,255,255,0.06)', marginBottom: 8 }}>
                <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.15em' }}>Library Management</div>
              </div>
              {[
                { l: '设为壁纸', i: 'monitor', a: () => onSetWallpaper(contextMenu.w) },
                { l: '进入色彩调节', i: 'sliders', a: () => { onEditColor && onEditColor(contextMenu.w); setContextMenu(null); } },
                { l: '编辑分类标签', i: 'plus', a: () => setShowTagManager(true) },
                { type: 'sep' },
                { l: contextMenu.w.isFavorite ? '取消收藏' : '设为收藏', i: contextMenu.w.isFavorite ? 'heart-filled' : 'heart', a: () => { onToggleFavorite && onToggleFavorite(contextMenu.w); setContextMenu(null); } },
                { l: '在访达中显示', i: 'monitor', a: () => { bridge.call('revealInFinder', { wallpaperId: contextMenu.w.id }); setContextMenu(null); } },
                { l: '移至回收站', i: 'close', a: () => { onDelete && onDelete(contextMenu.w); setContextMenu(null); }, c: '#ff4d4d' },
              ].map((it, idx) => it.type === 'sep' ? (
                <div key={idx} style={{ height: 1, background: 'rgba(255,255,255,0.08)', margin: '4px 8px' }} />
              ) : (
                <div key={it.l} onClick={(e) => { e.stopPropagation(); it.a(); }} style={{ 
                  padding: '10px 12px', borderRadius: 8, fontSize: 13, fontWeight: 500,
                  display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', transition: '0.15s', 
                  color: it.c || 'rgba(255,255,255,0.85)' 
                }} className="menu-item">
                  <Icon name={it.i} size={14} />
                  <span>{it.l}</span>
                </div>
              ))}
            </div>
          )}

          <style>{`
            .library-card-v2:hover .card-container { transform: scale(1.03) translateY(-8px); border-color: rgba(255,255,255,0.2); }
            .library-card-v2:hover .aura-glow { opacity: 0.3; transform: scale(1.2); }
            .library-card-v2:hover .card-img { transform: scale(1.05); }
            .library-card-v2:hover .card-overlay { opacity: 1; }
            .menu-item:hover { background: var(--accent); color: #fff; }
          `}</style>

          {showTagManager && (
            <div style={{ position: 'fixed', inset: 0, zIndex: 4000, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(10px)', display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={() => setShowTagManager(false)}>
              <div className="animate-in" style={{ width: 340, background: '#1a1b1e', borderRadius: 24, border: '1px solid var(--glass-border)', padding: 32, boxShadow: '0 40px 100px rgba(0,0,0,0.6)' }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 22, marginBottom: 24, fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 600 }}>管理壁纸标签</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 32 }}>
                  {['自然', '城市', '动漫', '4K', '极简', '暗色'].map(t => (
                    <div key={t} style={{ padding: '6px 12px', borderRadius: 8, background: 'rgba(255,255,255,0.05)', border: '1px solid var(--glass-border)', fontSize: 12, cursor: 'pointer', transition: '0.2s' }}>{t}</div>
                  ))}
                  <div style={{ padding: '6px 12px', borderRadius: 8, background: 'rgba(255,255,255,0.1)', border: '1px dashed var(--accent)', fontSize: 12, cursor: 'pointer', color: 'var(--accent)' }}>+ 新标签</div>
                </div>
                <button className="btn-primary btn" style={{ width: '100%', justifyContent: 'center', height: 48 }} onClick={() => setShowTagManager(false)}>保存修改</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const SliderControl = ({ label, value, min, max, onChange, displayValue }) => (
      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '32px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
          <span className="control-label">{label}</span>
          <span className="control-val">{displayValue || value}</span>
        </div>
        <input type="range" min={min} max={max} value={value} onChange={e => onChange(Number(e.target.value))} />
      </div>
    );

    const ColorPage = ({ wallpaper, setView, onSave, savedPresets = [], onSavePreset, onDeletePreset, settings }) => {
      const fp = wallpaper.filterPreset;
      const [hue, setHue] = useState(fp ? n(fp.hue, 0) : 0);
      const [sat, setSat] = useState(fp ? n(fp.saturation, 100) : 100);
      const [bri, setBri] = useState(fp ? n(fp.brightness, 100) : 100);
      const [con, setCon] = useState(fp ? n(fp.contrast, 100) : 100);
      const [blur, setBlur] = useState(fp ? n(fp.blur, 0) : 0);
      const [gray, setGray] = useState(fp ? n(fp.grayscale, 0) : 0);
      const [inv, setInv] = useState(fp ? n(fp.invert, 0) : 0);
      const [expo, setExpo] = useState(fp ? n(fp.exposure, 100) : 100);
      const [grain, setGrain] = useState(fp ? n(fp.grain, 0) : 0);
      const [vignette, setVignette] = useState(fp ? n(fp.vignette, 0) : 0);
      const [currentPresetName, setCurrentPresetName] = useState(fp ? fp.name : '自定义调色');

      const [colorMuted, setColorMuted] = useState(true);
      const [colorVolume, setColorVolume] = useState(() => (wallpaper.volumeOverride != null ? wallpaper.volumeOverride : 100));
      const [showColorVolSlider, setShowColorVolSlider] = useState(false);
      const [showSavePopup, setShowSavePopup] = useState(false);
      const [presetName, setPresetName] = useState('我的自定义色调');
      const [showAllSaved, setShowAllSaved] = useState(false);
      const [presetMenu, setPresetMenu] = useState(null);
      const [editingPreset, setEditingPreset] = useState(null);
      const [editName, setEditName] = useState('');
      const [selectedSavedPresetId, setSelectedSavedPresetId] = useState(null);

      const mediaRef = useRef(null);
      const canvasRef = useRef(document.createElement('canvas'));
      const [panelTheme, setPanelTheme] = useState({ mode: 'difference', color: '#fff', sub: 'rgba(255,255,255,0.7)', track: 'rgba(255,255,255,0.4)' });

      useEffect(() => {
        const hide = () => setPresetMenu(null);
        window.addEventListener('click', hide);
        return () => window.removeEventListener('click', hide);
      }, []);

      useEffect(() => {
        const el = mediaRef.current;
        if (el && wallpaper.type === 'video') {
          el.muted = colorMuted;
          const globalVol = (settings?.globalVolume ?? 50) / 100;
          el.volume = (colorVolume / 100) * globalVol;
        }
      }, [colorMuted, colorVolume, wallpaper.type, settings?.globalVolume]);

      useEffect(() => {
        let raf;
        const sample = () => {
          const el = mediaRef.current;
          if (!el || !el.complete && !el.videoWidth) { raf = requestAnimationFrame(sample); return; }
          const cvs = canvasRef.current;
          const ctx = cvs.getContext('2d', { willReadFrequently: true });
          const sw = el.videoWidth || el.naturalWidth || el.width;
          const sh = el.videoHeight || el.naturalHeight || el.height;
          if (!sw || !sh) { raf = requestAnimationFrame(sample); return; }

          const panelRatio = 400 / window.innerWidth;
          const sampleX = Math.floor(sw * (1 - panelRatio));
          const sampleW = sw - sampleX;
          cvs.width = 32; cvs.height = 32;
          ctx.drawImage(el, sampleX, 0, sampleW, sh, 0, 0, 32, 32);
          const data = ctx.getImageData(0, 0, 32, 32).data;

          let totalLum = 0;
          const count = data.length / 4;
          for (let i = 0; i < data.length; i += 4) {
            totalLum += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
          }
          const avgLum = totalLum / count;

          let theme;
          if (avgLum < 85) {
            theme = { mode: 'difference', color: '#fff', sub: 'rgba(255,255,255,0.7)', track: 'rgba(255,255,255,0.4)' };
          } else if (avgLum > 170) {
            theme = { mode: 'difference', color: '#fff', sub: 'rgba(255,255,255,0.7)', track: 'rgba(255,255,255,0.4)' };
          } else {
            const useWhite = avgLum < 128;
            if (useWhite) {
              theme = { mode: 'normal', color: '#fff', sub: 'rgba(255,255,255,0.85)', track: 'rgba(255,255,255,0.5)' };
            } else {
              theme = { mode: 'normal', color: '#000', sub: 'rgba(0,0,0,0.75)', track: 'rgba(0,0,0,0.4)' };
            }
          }

          setPanelTheme(prev => {
            if (prev.mode === theme.mode && prev.color === theme.color) return prev;
            return theme;
          });
          raf = requestAnimationFrame(sample);
        };
        raf = requestAnimationFrame(sample);
        return () => cancelAnimationFrame(raf);
      }, [hue, sat, bri, con, blur, gray, inv, expo]);

      const reset = () => {
        setHue(0); setSat(100); setBri(100); setCon(100); setBlur(0);
        setGray(0); setInv(0); setExpo(100); setGrain(0); setVignette(0);
        setCurrentPresetName('自定义调色');
        setSelectedSavedPresetId(null);
      };

      const applyPreset = (p) => {
        setHue(p.hue || 0); setSat(p.saturation != null ? p.saturation : 100);
        setBri(p.brightness != null ? p.brightness : 100); setCon(p.contrast != null ? p.contrast : 100);
        setBlur(p.blur || 0); setGray(p.grayscale || 0); setInv(p.invert || 0);
        setExpo(p.exposure != null ? p.exposure : 100); setGrain(p.grain || 0); setVignette(p.vignette || 0);
        setCurrentPresetName(p.name);
        setSelectedSavedPresetId(p.id && p.id.startsWith('user_') ? p.id : null);
      };

      const getCurrentFilter = () => ({
        name: currentPresetName,
        exposure: expo, contrast: con, saturation: sat, hue: hue,
        blur: blur, grain: grain, vignette: vignette, grayscale: gray, invert: inv
      });

      const handleSliderChange = (setter) => (value) => {
        if (!selectedSavedPresetId) setCurrentPresetName('自定义调色');
        setter(value);
      };

      const filterString = `
        hue-rotate(${hue}deg) 
        saturate(${sat}%) 
        brightness(${bri}%) 
        contrast(${con}%) 
        blur(${blur}px)
        grayscale(${gray}%)
        invert(${inv}%)
        brightness(${expo}%)
      `;

      return (
        <div className="hudson-base adaptive-blend animate-in" style={{ width: '100vw', height: '100vh', position: 'relative', overflow: 'hidden', '--text-main': panelTheme.color, '--text-sub': panelTheme.sub, '--accent': panelTheme.color, '--track-bg': panelTheme.track, '--blend-mode': panelTheme.mode }}>
          <style>{`
            .hudson-base.adaptive-blend {
              --shadow-text: none;
              --shadow-ui: none;
            }
            .floating-panel { 
              position: absolute; top: 0; right: 0; bottom: 0; width: 400px;
              padding: 80px 48px; background: transparent; overflow-y: auto; pointer-events: auto;
              mix-blend-mode: var(--blend-mode); transition: mix-blend-mode 0.3s;
            }
            .group-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 32px; color: var(--text-main); text-shadow: var(--shadow-text); margin-bottom: 28px; letter-spacing: -0.02em; transition: color 0.4s, text-shadow 0.4s; }
            .control-label { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: var(--text-sub); text-transform: uppercase; text-shadow: var(--shadow-text); transition: color 0.4s, text-shadow 0.4s; }
            .control-val { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--text-main); text-shadow: var(--shadow-text); transition: color 0.4s, text-shadow 0.4s; }
            
            .hudson-base input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 32px; cursor: pointer; }
            .hudson-base input[type=range]:focus { outline: none; }
            .hudson-base input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: var(--track-bg); box-shadow: var(--shadow-ui); transition: 0.4s; }
            .hudson-base input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: transparent; border: 1.5px solid var(--accent); margin-top: -8.5px; box-shadow: var(--shadow-ui); transition: transform 0.3s, background 0.3s, border-color 0.4s, box-shadow 0.4s; }
            .hudson-base input[type=range]::-webkit-slider-thumb:hover, .hudson-base input[type=range]:active::-webkit-slider-thumb { transform: scale(1.3); background: rgba(128,128,128,0.15); }
            
            .preset-btn { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-sub); background: transparent; border: none; padding: 10px 0; text-align: left; cursor: pointer; transition: 0.4s; text-shadow: var(--shadow-text); border-bottom: 1px solid transparent; display: block; width: 100%; }
            .preset-btn:hover { color: var(--accent); border-bottom-color: var(--accent); letter-spacing: 0.2em; }
            .preset-chip:hover { border-color: var(--accent) !important; color: var(--accent) !important; opacity: 1 !important; }
          `}</style>
          
          {/* 背景全屏壁纸 (完全覆盖) */}
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
            {wallpaper.type === 'video' ? (
              <video ref={mediaRef} src={wallpaper.filePath} autoPlay loop muted playsInline crossOrigin="anonymous" style={{ width: '100%', height: '100%', objectFit: 'cover', filter: filterString }} />
            ) : (
              <img ref={mediaRef} src={wallpaper.filePath} crossOrigin="anonymous" style={{ width: '100%', height: '100%', objectFit: 'cover', filter: filterString }} />
            )}
            
            <div style={{ 
              position: 'absolute', inset: 0, 
              background: `radial-gradient(circle, transparent ${100 - vignette}%, rgba(0,0,0,${vignette/100}))`,
            }} />
            {grain > 0 && (
              <div style={{ 
                position: 'absolute', inset: 0, opacity: grain / 100,
                backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")`
              }} />
            )}
          </div>

          <div style={{ position: 'absolute', top: 32, left: 32, zIndex: 100, display: 'flex', gap: 12, alignItems: 'center' }}>
            <button onClick={() => setView('home')} className="btn" style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(20px)', borderRadius: '50%', width: 44, height: 44, padding: 0, justifyContent: 'center', border: '1px solid rgba(255,255,255,0.1)' }}><Icon name="close" /></button>
            {wallpaper.type === 'video' && wallpaper.hasAudio && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}
                onMouseEnter={() => setShowColorVolSlider(true)} onMouseLeave={() => setShowColorVolSlider(false)}>
                {showColorVolSlider && (
                  <div className="animate-in" style={{ background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(20px)', borderRadius: 10, padding: '8px 16px', border: '1px solid rgba(255,255,255,0.1)', display: 'flex', alignItems: 'center', gap: 10 }}>
                    <input type="range" min={0} max={100} value={colorVolume} onChange={e => { setColorVolume(Number(e.target.value)); if (colorMuted) setColorMuted(false); }} onMouseUp={() => { bridge.call('setWallpaperVolume', { wallpaperId: wallpaper.id, volume: colorVolume }); }} style={{ width: 100, accentColor: 'var(--accent)' }} />
                    <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', minWidth: 30, textAlign: 'right' }}>{colorVolume}%</span>
                  </div>
                )}
                <button onClick={() => setColorMuted(!colorMuted)} className="btn" style={{ background: 'rgba(0,0,0,0.4)', backdropFilter: 'blur(20px)', borderRadius: '50%', width: 44, height: 44, padding: 0, justifyContent: 'center', border: '1px solid rgba(255,255,255,0.1)' }}>
                  <Icon name={colorMuted ? 'volume-x' : 'volume-1'} size={18} />
                </button>
              </div>
            )}
          </div>

          {/* 右侧完全悬浮面板 (无 background, 无 blur) */}
          <div className="floating-panel no-scrollbar">
            <div style={{ marginBottom: 56 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                <span style={{ padding: '2px 8px', border: '1px solid var(--accent)', borderRadius: 4, fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--text-main)' }}>{wallpaper.tags && wallpaper.tags[0] ? (wallpaper.tags[0].name || String(wallpaper.tags[0])) : ''}</span>
                {wallpaper.isFavorite && <Icon name="heart-filled" size={12} color="var(--accent)" />}
              </div>
              <h2 className="group-title" style={{ marginBottom: 8, lineHeight: 1.2 }}>{wallpaper.name}</h2>
              <div style={{ fontSize: 11, color: 'var(--text-sub)', textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 500 }}>色彩调节工作室</div>
            </div>

            <div style={{ marginBottom: 64 }}>
              <div className="group-title">基础</div>
              <SliderControl label="曝光" value={expo} min={0} max={200} onChange={handleSliderChange(setExpo)} displayValue={`${expo}%`} />
              <SliderControl label="对比度" value={con} min={50} max={150} onChange={handleSliderChange(setCon)} displayValue={`${con}%`} />
              <SliderControl label="饱和度" value={sat} min={0} max={200} onChange={handleSliderChange(setSat)} displayValue={`${sat}%`} />
              <SliderControl label="色相" value={hue} min={-180} max={180} onChange={handleSliderChange(setHue)} displayValue={`${hue}°`} />
            </div>

            <div style={{ marginBottom: 64 }}>
              <div className="group-title">艺术</div>
              <SliderControl label="模糊" value={blur} min={0} max={20} onChange={handleSliderChange(setBlur)} displayValue={`${blur}px`} />
              <SliderControl label="颗粒" value={grain} min={0} max={100} onChange={handleSliderChange(setGrain)} displayValue={`${grain}%`} />
              <SliderControl label="暗角" value={vignette} min={0} max={100} onChange={handleSliderChange(setVignette)} displayValue={`${vignette}%`} />
            </div>

            <div style={{ marginBottom: 64 }}>
              <div className="group-title">滤镜</div>
              <SliderControl label="灰度" value={gray} min={0} max={100} onChange={handleSliderChange(setGray)} displayValue={`${gray}%`} />
              <SliderControl label="反相" value={inv} min={0} max={100} onChange={handleSliderChange(setInv)} displayValue={`${inv}%`} />
            </div>

            <div style={{ marginBottom: 40 }}>
              <div className="group-title">预设</div>
              <div style={{ fontSize: 10, color: 'var(--text-sub)', opacity: 0.4, marginBottom: 10, letterSpacing: '0.1em', textTransform: 'uppercase' }}>内置</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 24 }}>
                {BUILTIN_PRESETS.map(p => (
                  <div key={p.id} onClick={() => applyPreset(p)} className="preset-chip" style={{
                    padding: '6px 14px', borderRadius: 20, fontSize: 11, cursor: 'pointer',
                    border: '1px solid ' + (currentPresetName === p.name ? 'var(--accent)' : 'rgba(128,128,128,0.3)'),
                    color: currentPresetName === p.name ? 'var(--accent)' : 'var(--text-sub)',
                    background: currentPresetName === p.name ? 'rgba(128,128,128,0.1)' : 'transparent',
                    transition: '0.3s', letterSpacing: '0.03em', whiteSpace: 'nowrap'

                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 24 }}>
                    {(showAllSaved ? savedPresets : savedPresets.slice(0, 6)).map(p => (
                      <div key={p.id} onClick={() => applyPreset(p)}
                        onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); setPresetMenu({ x: e.clientX, y: e.clientY, preset: p }); }}
                        className="preset-chip" style={{
                        padding: '6px 14px', borderRadius: 20, fontSize: 11, cursor: 'pointer',
                        border: '1px solid ' + (currentPresetName === p.name ? 'var(--accent)' : 'rgba(128,128,128,0.3)'),
                        color: currentPresetName === p.name ? 'var(--accent)' : 'var(--text-sub)',
                        background: currentPresetName === p.name ? 'rgba(128,128,128,0.1)' : 'transparent',
                        transition: '0.3s', letterSpacing: '0.03em', whiteSpace: 'nowrap', position: 'relative'
                      }}>{p.name}</div>
                    ))}
                    {savedPresets.length > 6 && (
                      <div onClick={() => setShowAllSaved(!showAllSaved)} style={{
                        padding: '6px 14px', borderRadius: 20, fontSize: 11, cursor: 'pointer',
                        border: '1px dashed rgba(128,128,128,0.25)', color: 'var(--text-sub)', opacity: 0.5,
                        transition: '0.3s', whiteSpace: 'nowrap'
                      }}>{showAllSaved ? '收起' : `+${savedPresets.length - 6}`}</div>

                  </div>
                </>
