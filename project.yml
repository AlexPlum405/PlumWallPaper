name: PlumWallPaper
options:
  bundleIdPrefix: com.plum
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.0.0"
targets:
  PlumWallPaper:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Sources/Resources
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plum.wallpaper
        PRODUCT_NAME: PlumWallPaper
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_CFBundleDevelopmentRegion: zh_CN
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
