<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Plum x Zima Blue - Immersive Gallery</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, sans-serif; }
        #root { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 核心动画：齐马蓝闪烁 */
        @keyframes zimaFlash {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(2); }
        }
        .flash-overlay {
            position: absolute; inset: 0; background: #36a9e1;
            z-index: 1000; pointer-events: none; opacity: 0;
        }
        .trigger-flash { animation: zimaFlash 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        /* 壁纸卡片 */
        .zima-card {
            position: relative; aspect-ratio: 16/9; background: #111;
            cursor: pointer; overflow: hidden; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .zima-card:hover { transform: scale(1.02); border-color: #36a9e1; }
        .zima-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.6s; }
        .zima-card:hover img { opacity: 1; }

        /* 沉浸视图容器 */
        .immersive-view {
            position: absolute; inset: 0; background: #000; z-index: 500;
            display: flex; align-items: center; justify-content: center;
            animation: slideIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const WALLPAPERS = [
            { id: "ZM-001", name: "Deep Void", artist: "Alastair", img: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1200", res: "3840x2160", srgb: "100%" },
            { id: "ZM-002", name: "The Blue Fragment", artist: "Zima", img: "https://images.unsplash.com/photo-1502691876148-a84978f5d81b?w=1200", res: "5120x2880", srgb: "DCI-P3" },
            { id: "ZM-003", name: "Beyond the Rift", artist: "K. Dick", img: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1200", res: "3840x2160", srgb: "AdobeRGB" },
            { id: "ZM-004", name: "Synthesized Mind", artist: "Robot 01", img: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=1200", res: "4096x2304", srgb: "100%" }
        ];

        function GalleryApp() {
            const [selected, setSelected] = useState(null);
            const [isFlashing, setIsFlashing] = useState(false);

            const handleWallpaperClick = (wp) => {
                setIsFlashing(true);
                setTimeout(() => {
                    setSelected(wp);
                    setIsFlashing(false);
                }, 300);
            };

            return (
                <div style={{ width: '100vw', height: '100vh', position: 'relative', display: 'flex', justifyContent: 'center', align_items: 'center' }}>
                    
                    {/* 齐马蓝闪屏图层 */}
                    <div className={`flash-overlay ${isFlashing ? 'trigger-flash' : ''}`} />

                    {/* 主窗口 */}
                    <div style={{
                        width: 1000, height: 700, background: '#080808',
                        borderRadius: 12, overflow: 'hidden', position: 'relative',
                        boxShadow: '0 50px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1)'
                    }}>
                        
                        {/* 导航头 */}
                        <div style={{ height: 40, borderBottom: '1px solid #111', display: 'flex', alignItems: 'center', padding: '0 20px' }}>
                            <div style={{ display: 'flex', gap: 8 }}>
                                <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#ff5f57' }} />
                                <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#febc2e' }} />
                                <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#28c840' }} />
                            </div>
                            <div style={{ marginLeft: 30, fontSize: 10, letterSpacing: '2px', color: '#444' }}>PLUM // PROTOCOL_SELECT</div>
                        </div>

                        {/* 画廊网格 */}
                        <div style={{ padding: '40px', display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '20px', height: 'calc(100% - 120px)', overflowY: 'auto' }}>
                            {WALLPAPERS.map(wp => (
                                <div key={wp.id} className="zima-card" onClick={() => handleWallpaperClick(wp)}>
                                    <img src={wp.img} />
                                    <div style={{ position: 'absolute', bottom: 15, left: 15, fontSize: 12, fontWeight: 600 }}>{wp.name}</div>
                                    <div style={{ position: 'absolute', top: 15, right: 15, fontSize: 9, color: '#36a9e1', fontWeight: 900 }}>{wp.id}</div>
                                </div>
                            ))}
                        </div>

                        {/* 沉浸详情页 (点击后弹出) */}
                        {selected && (
                            <div className="immersive-view">
                                <img src={selected.img} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                                
                                {/* 沉浸页 UI */}
                                <div style={{ position: 'absolute', inset: 0, padding: 60, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', pointerEvents: 'none' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                        <div 
                                            style={{ width: 40, height: 40, background: '#36a9e1', cursor: 'pointer', pointerEvents: 'auto', display: 'flex', justifyContent: 'center', align_items: 'center' }}
                                            onClick={() => setSelected(null)}
                                        >
                                            <div style={{ fontSize: 10, color: '#fff', fontWeight: 800 }}>BACK</div>
                                        </div>
                                        <div style={{ textAlign: 'right', fontSize: 10, letterSpacing: '2px', color: '#36a9e1' }}>
                                            IMMERSED // {selected.id}<br/>{selected.res} // {selected.srgb}
                                        </div>
                                    </div>
                                    <div>
                                        <div style={{ fontFamily: 'Newsreader', fontSize: 48, fontStyle: 'italic', marginBottom: 10 }}>{selected.name}</div>
                                        <div style={{ fontSize: 12, letterSpacing: '5px', opacity: 0.5 }}>AUTHOR: {selected.artist}</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 状态栏 */}
                        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 24, background: '#36a9e1', display: 'flex', alignItems: 'center', padding: '0 20px', fontSize: 9, fontWeight: 700 }}>
                            CORE_SYNC: ACTIVE // WAITING_FOR_INPUT
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<GalleryApp />);
    </script>
</body>
</html>
