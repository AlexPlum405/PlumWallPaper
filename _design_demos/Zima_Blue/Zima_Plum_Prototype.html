<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plum x Zima Blue - Interactive Prototype</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 齐马蓝专属背景网格 */
        .pool-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(54, 169, 225, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(54, 169, 225, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .zima-accent { color: #36a9e1; }
        .zima-bg { background-color: #36a9e1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        /**
         * MacosWindow (Huashu-Design Asset)
         */
        const macosWindowStyles = {
            window: {
                display: 'inline-block',
                background: '#080808',
                borderRadius: 12,
                overflow: 'hidden',
                boxShadow: '0 50px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1)',
                position: 'relative'
            },
            titleBar: {
                height: 38,
                background: '#080808',
                display: 'flex',
                alignItems: 'center',
                padding: '0 14px',
                borderBottom: '1px solid rgba(255,255,255,0.05)',
                position: 'relative',
                zIndex: 10
            },
            trafficLights: {
                display: 'flex',
                gap: 8,
                alignItems: 'center',
            },
            light: {
                width: 12,
                height: 12,
                borderRadius: '50%',
                border: '0.5px solid rgba(0,0,0,0.15)',
            },
            close: { background: '#ff5f57' },
            minimize: { background: '#febc2e' },
            maximize: { background: '#28c840' },
            title: {
                position: 'absolute',
                left: 0,
                right: 0,
                textAlign: 'center',
                fontSize: 12,
                color: '#666',
                fontWeight: 400,
                letterSpacing: '0.1em',
                pointerEvents: 'none',
                textTransform: 'uppercase'
            }
        };

        function MacosWindow({ title, width = 1000, height = 700, children }) {
            return (
                <div style={{ ...macosWindowStyles.window, width, height }}>
                    <div style={macosWindowStyles.titleBar}>
                        <div style={macosWindowStyles.trafficLights}>
                            <div style={{ ...macosWindowStyles.light, ...macosWindowStyles.close }} />
                            <div style={{ ...macosWindowStyles.light, ...macosWindowStyles.minimize }} />
                            <div style={{ ...macosWindowStyles.light, ...macosWindowStyles.maximize }} />
                        </div>
                        <div style={macosWindowStyles.title}>{title}</div>
                    </div>
                    <div style={{ position: 'relative', width: '100%', height: height - 38 }}>
                        {children}
                    </div>
                </div>
            );
        }

        /**
         * App Logic
         */
        const { useState, useEffect } = React;

        const WALLPAPERS = [
            { id: 1, name: "Deep Void", url: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&q=80&w=1200", artist: "Zima" },
            { id: 2, name: "The Blue Fragment", url: "https://images.unsplash.com/photo-1502691876148-a84978f5d81b?auto=format&fit=crop&q=80&w=1200", artist: "The Witness" },
            { id: 3, name: "Beyond the Rift", url: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&q=80&w=1200", artist: "Sonnies Edge" }
        ];

        function ZimaApp() {
            const [selected, setSelected] = useState(WALLPAPERS[0]);
            const [hoveringNav, setHoveringNav] = useState(false);
            const [applied, setApplied] = useState(false);

            const handleApply = () => {
                setApplied(true);
                setTimeout(() => setApplied(false), 2000);
            };

            return (
                <MacosWindow title="Plum · Zima Protocol v1.0">
                    <div className="pool-grid" />

                    {/* 背景显示层 */}
                    <div style={{
                        position: 'absolute',
                        inset: 40,
                        overflow: 'hidden',
                        borderRadius: 4,
                        transition: 'all 0.8s cubic-bezier(0.19, 1, 0.22, 1)',
                        boxShadow: '0 40px 80px rgba(0,0,0,0.5)',
                        filter: applied ? 'brightness(1.5)' : 'none'
                    }}>
                        <img
                            src={selected.url}
                            style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                            alt={selected.name}
                        />
                    </div>

                    {/* 齐马蓝闪烁验证 */}
                    {applied && (
                        <div style={{
                            position: 'absolute',
                            top: '50%',
                            left: '50%',
                            transform: 'translate(-50%, -50%)',
                            width: 100,
                            height: 100,
                            backgroundColor: '#36a9e1',
                            animation: 'pulse 1.5s ease-out forwards',
                            zIndex: 100,
                            boxShadow: '0 0 100px #36a9e1'
                        }} />
                    )}

                    {/* 左侧：叙事信息 (仅在非沉浸态显示或由Hover触发) */}
                    <div style={{
                        position: 'absolute',
                        left: 60,
                        bottom: 60,
                        maxWidth: 300,
                        pointerEvents: 'none'
                    }}>
                        <div style={{
                            fontFamily: '"Newsreader", serif',
                            fontSize: 32,
                            fontStyle: 'italic',
                            marginBottom: 8,
                            opacity: 0.9
                        }}>
                            {selected.name}
                        </div>
                        <div style={{
                            fontSize: 10,
                            letterSpacing: '0.4em',
                            color: '#36a9e1',
                            textTransform: 'uppercase',
                            fontWeight: 600
                        }}>
                            {selected.artist} · 11400:00:21
                        </div>
                    </div>

                    {/* 右侧：交互控制 (Hover 触发) */}
                    <div
                        onMouseEnter={() => setHoveringNav(true)}
                        onMouseLeave={() => setHoveringNav(false)}
                        style={{
                            position: 'absolute',
                            right: 0,
                            top: 0,
                            bottom: 0,
                            width: 200,
                            display: 'flex',
                            flexDirection: 'column',
                            justifyContent: 'center',
                            alignItems: 'flex-end',
                            paddingRight: 40,
                            zIndex: 50
                        }}
                    >
                        <div style={{
                            transform: hoveringNav ? 'translateX(0)' : 'translateX(100px)',
                            opacity: hoveringNav ? 1 : 0,
                            transition: 'all 0.6s cubic-bezier(0.19, 1, 0.22, 1)',
                            display: 'flex',
                            flexDirection: 'column',
                            gap: 24,
                            alignItems: 'flex-end'
                        }}>
                            {WALLPAPERS.map((wp, i) => (
                                <div
                                    key={wp.id}
                                    onClick={() => setSelected(wp)}
                                    style={{
                                        width: 120,
                                        height: 80,
                                        background: wp.id === selected.id ? '#36a9e1' : '#1a1a1a',
                                        padding: 1,
                                        cursor: 'pointer',
                                        transition: 'all 0.3s ease',
                                        boxShadow: wp.id === selected.id ? '0 0 20px rgba(54, 169, 225, 0.4)' : 'none',
                                        position: 'relative',
                                        overflow: 'hidden'
                                    }}
                                >
                                    <img src={wp.url} style={{ width: '100%', height: '100%', objectFit: 'cover', opacity: 0.6 }} />
                                    <div style={{
                                        position: 'absolute',
                                        bottom: 4,
                                        right: 6,
                                        fontSize: 9,
                                        color: '#fff',
                                        fontWeight: 800
                                    }}>
                                        0{i+1}
                                    </div>
                                </div>
                            ))}

                            <div
                                onClick={handleApply}
                                style={{
                                    marginTop: 20,
                                    width: 48,
                                    height: 48,
                                    background: '#36a9e1',
                                    display: 'flex',
                                    justifyContent: 'center',
                                    alignItems: 'center',
                                    cursor: 'pointer',
                                    clipPath: 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)'
                                }}>
                                <div style={{ width: 12, height: 12, border: '2px solid white' }} />
                            </div>
                        </div>
                    </div>

                    {/* LDR 水印 */}
                    <div style={{
                        position: 'absolute',
                        bottom: 24,
                        right: 32,
                        display: 'flex',
                        gap: 12,
                        opacity: 0.3,
                        filter: 'grayscale(1)'
                    }}>
                        <div style={{ fontSize: 14 }}>❤️</div>
                        <div style={{ fontSize: 14 }}>❌</div>
                        <div style={{ fontSize: 14 }}>🤖</div>
                    </div>

                    <style>{`
                        @keyframes pulse {
                            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
                            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
                        }
                    `}</style>
                </MacosWindow>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ZimaApp />);
    </script>
</body>
</html>
