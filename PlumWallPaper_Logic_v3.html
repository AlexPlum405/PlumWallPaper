<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlumWallPaper · Logic Pro (v13 Orchestrator)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --accent: #BB8FCE;
            --bg: #0A0A0A;
            --card-bg: #1A1A1A;
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: -apple-system, "SF Pro Text", sans-serif; display: flex; align-items: center; justify-content: center; overflow: hidden; color: #fff; }
        #root { width: 1100px; height: 750px; background: var(--bg); border-radius: 20px; display: flex; position: relative; box-shadow: 0 80px 160px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        
        @keyframes shimmer { 0% { background-position: -468px 0 } 100% { background-position: 468px 0 } }
        .shimmer {
            background: #252525;
            background-image: linear-gradient(to right, #252525 0%, #333 20%, #252525 40%, #252525 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%;
            animation: shimmer 1.5s linear infinite forwards;
        }

        .traffic-lights { position: absolute; top: 18px; left: 20px; display: flex; gap: 8px; z-index: 100; }
        .light { width: 12px; height: 12px; border-radius: 50%; }
        .close { background: #FF5F57; } .min { background: #FEBC2E; } .max { background: #28C840; }
        
        .tab-content { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Mock Data ---
        const ALL_WALLPAPERS = [
            { id: 1, title: "Luminescent Flux", tag: "Metal", color: "#4A235A" },
            { id: 2, title: "Sequoia Deep", tag: "Nature", color: "#1B4F72" },
            { id: 3, title: "Cyber Glitch", tag: "Cyber", color: "#145A32" },
            { id: 4, title: "Ethereal Drift", tag: "Metal", color: "#78281F" },
            { id: 5, title: "Geometric Voids", tag: "Cyber", color: "#1E1E1E" },
            { id: 6, title: "Solar Winds", tag: "Nature", color: "#7D6608" },
        ];

        // --- Haptic Button Component ---
        const HapticButton = ({ children, onClick, active, style }) => {
            const [pressed, setPressed] = useState(false);
            return (
                <div 
                    onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)} onMouseLeave={() => setPressed(false)}
                    onClick={onClick}
                    style={{
                        cursor: 'pointer', transition: 'transform 0.1s ease',
                        transform: pressed ? 'scale(0.92)' : 'scale(1)',
                        ...style
                    }}
                >
                    {children}
                </div>
            );
        };

        const MainApp = () => {
            // --- CENTRAL STATE (v13 Strategy) ---
            const [wallpapers, setWallpapers] = useState(ALL_WALLPAPERS.map(w => ({ ...w, isFav: false })));
            const [activeTab, setActiveTab] = useState('explore'); // 'explore' or 'fav'
            const [filter, setFilter] = useState('All');
            const [loading, setLoading] = useState(false);

            const toggleFav = (id) => {
                setWallpapers(prev => prev.map(w => w.id === id ? { ...w, isFav: !w.isFav } : w));
            };

            const handleFilterChange = (newFilter) => {
                if (newFilter === filter) return;
                setLoading(true);
                setFilter(newFilter);
                setTimeout(() => setLoading(false), 800); // 模拟异步加载
            };

            const displayedWallpapers = useMemo(() => {
                let list = wallpapers;
                if (activeTab === 'fav') list = list.filter(w => w.isFav);
                if (filter !== 'All') list = list.filter(w => w.tag === filter);
                return list;
            }, [wallpapers, activeTab, filter]);

            const favCount = wallpapers.filter(w => w.isFav).length;

            return (
                <div style={{ display: 'flex', width: '100%', height: '100%' }}>
                    <div className="traffic-lights">
                        <div className="light close" /> <div className="light min" /> <div className="light max" />
                    </div>

                    {/* Sidebar */}
                    <div style={{ width: 220, background: 'rgba(255,255,255,0.03)', borderRight: '1px solid rgba(255,255,255,0.05)', padding: '70px 12px 20px 12px' }}>
                        <div onClick={() => setActiveTab('explore')} style={{ padding: '10px 16px', borderRadius: 10, cursor: 'pointer', background: activeTab === 'explore' ? 'var(--accent)' : 'transparent', color: activeTab === 'explore' ? '#000' : '#888', fontWeight: 600, marginBottom: 4 }}>
                            发现 Explore
                        </div>
                        <div onClick={() => setActiveTab('fav')} style={{ padding: '10px 16px', borderRadius: 10, cursor: 'pointer', background: activeTab === 'fav' ? 'var(--accent)' : 'transparent', color: activeTab === 'fav' ? '#000' : '#888', fontWeight: 600, display: 'flex', justifyContent: 'space-between' }}>
                            <span>收藏夹</span>
                            {favCount > 0 && <span style={{ opacity: 0.6 }}>{favCount}</span>}
                        </div>
                    </div>

                    {/* Content */}
                    <div style={{ flex: 1, padding: '40px', overflowY: 'auto' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 30 }}>
                            <h1 style={{ fontSize: 32, fontWeight: 800, margin: 0 }}>
                                {activeTab === 'explore' ? 'Explore' : 'Your Vault'}
                            </h1>
                            {activeTab === 'explore' && (
                                <div style={{ display: 'flex', gap: 8 }}>
                                    {['All', 'Metal', 'Nature', 'Cyber'].map(t => (
                                        <div key={t} onClick={() => handleFilterChange(t)} style={{ padding: '6px 14px', borderRadius: 100, border: '1px solid rgba(255,255,255,0.1)', fontSize: 12, cursor: 'pointer', background: filter === t ? '#fff' : 'transparent', color: filter === t ? '#000' : '#888' }}>
                                            {t}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {loading ? (
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
                                {[1,2,3].map(i => <div key={i} className="shimmer" style={{ height: 180, borderRadius: 16 }} />)}
                            </div>
                        ) : (
                            <div className="tab-content" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
                                {displayedWallpapers.length === 0 ? (
                                    <div style={{ gridColumn: 'span 3', textAlign: 'center', padding: '100px 0', color: '#444' }}>
                                        这里空空如也...去首页收藏一些吧
                                    </div>
                                ) : (
                                    displayedWallpapers.map(wp => (
                                        <div key={wp.id} style={{ height: 200, borderRadius: 16, background: wp.color, position: 'relative', overflow: 'hidden' }}>
                                            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: 16, background: 'linear-gradient(to top, rgba(0,0,0,0.8), transparent)' }}>
                                                <div style={{ fontSize: 14, fontWeight: 700 }}>{wp.title}</div>
                                                <div style={{ fontSize: 10, opacity: 0.5 }}>{wp.tag} Engine</div>
                                            </div>
                                            <HapticButton 
                                                onClick={() => toggleFav(wp.id)}
                                                style={{ position: 'absolute', top: 12, right: 12, width: 32, height: 32, borderRadius: '50%', background: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(10px)', display: 'flex', alignItems: 'center', justifyCenter: 'center', fontSize: 14 }}
                                            >
                                                <span style={{ color: wp.isFav ? '#FF4B4B' : '#fff', width: '100%', textAlign: 'center' }}>{wp.isFav ? '♥' : '♡'}</span>
                                            </HapticButton>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
