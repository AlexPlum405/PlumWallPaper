<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlumWallPaper - Jewel Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0e12;
      --fg: #ffffff;
      --accent: #E03E3E; 
      --jewel-green: #2ECC71;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-thick: rgba(26, 29, 35, 0.85);
      --font-main: 'Cormorant Garamond', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    html, body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      overflow-y: scroll;
      user-select: none;
    }

    html::-webkit-scrollbar, body::-webkit-scrollbar, *::-webkit-scrollbar { display: none; width: 0; height: 0; }
    html, body, * { -ms-overflow-style: none; scrollbar-width: none; }

    .app { width: 100vw; min-height: 100vh; position: relative; }

    .hero-section {
      width: 100%;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: kenBurns 40s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes kenBurns {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13,14,18, 0.1) 0%,
        rgba(13,14,18, 0) 40%,
        var(--bg) 100%
      );
    }

    .topbar {
      position: relative;
      z-index: 100;
      height: 90px;
      display: flex;
      align-items: center;
      padding: 0 56px;
      gap: 16px;
    }

    .branding {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-right: 48px;
      cursor: pointer;
    }

    .logo-container {
      width: 48px;
      height: 48px;
      background: #16181c;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.05);
    }

    .logo-container svg { width: 32px; height: 32px; }

    .brand-text { display: flex; align-items: baseline; gap: 4px; }
    .brand-plum { font-size: 28px; font-weight: 700; color: #fff; }
    .brand-wallpaper { font-size: 28px; font-weight: 300; font-style: italic; color: rgba(255,255,255,0.35); }

    .nav-tabs {
      display: flex;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 4px;
      gap: 2px;
    }

    .nav-tab {
      padding: 6px 20px;
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-tab.active { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-tab:hover:not(.active) { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.04); }

    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .topbar-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .topbar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }

    .hero-content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 56px 48px;
    }

    .hero-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .hero-title {
      font-size: 92px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      line-height: 0.95;
      font-style: italic;
    }

    .hero-actions { display: flex; align-items: center; gap: 20px; }

    .btn-primary {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 36px;
      background: #fff;
      border: none;
      border-radius: 100px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary:hover { background: var(--accent); color: #fff; transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 30px rgba(224, 62, 62, 0.4); }

    .btn-icon {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      transition: all 0.3s;
    }

    .btn-icon.favorited { color: var(--accent); background: rgba(224, 62, 62, 0.1); border-color: rgba(224, 62, 62, 0.2); }

    .thumb-strip { position: relative; z-index: 10; padding: 0 56px 56px; display: flex; gap: 16px; overflow-x: auto; }
    .thumb-item {
      flex-shrink: 0;
      width: 160px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
      opacity: 0.3;
      filter: grayscale(1) contrast(1.2);
    }
    .thumb-item:hover { opacity: 0.6; filter: grayscale(0.5); transform: translateY(-4px); }
    .thumb-item.active { border-color: var(--accent); opacity: 1; filter: grayscale(0); transform: scale(1.05) translateY(-4px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

    .content-area { background: var(--bg); padding: 100px 0 140px; position: relative; z-index: 5; }
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; padding: 0 56px; margin-bottom: 40px; }
    .section-title { font-size: 48px; font-weight: 400; font-style: italic; letter-spacing: -0.02em; }
    .section-scroll { display: flex; gap: 36px; padding: 0 56px; overflow-x: auto; }

    .wallpaper-card { flex-shrink: 0; width: 340px; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .wallpaper-card:hover { transform: translateY(-12px); }
    .card-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 28px; overflow: hidden; position: relative; margin-bottom: 24px; border: 1px solid var(--glass-border); background: #1a1a1a; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1); }
    .wallpaper-card:hover .card-thumb img { transform: scale(1.15); }
    .card-badge { position: absolute; top: 18px; left: 18px; padding: 6px 14px; border-radius: 9px; font-size: 11px; font-weight: 700; background: var(--accent); color: #fff; letter-spacing: 0.1em; box-shadow: 0 4px 15px rgba(224, 62, 62, 0.4); }
    .card-fav { position: absolute; top: 18px; right: 18px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); border-radius: 50%; cursor: pointer; opacity: 0; transition: all 0.3s; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    .wallpaper-card:hover .card-fav { opacity: 1; }
    .card-fav.favorited { opacity: 1; color: var(--accent); background: rgba(0,0,0,0.5); }
    .card-name { font-size: 24px; font-style: italic; color: rgba(255,255,255,0.95); margin-bottom: 8px; }
    .card-meta { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.25); }
  </style>
</head>

    ];

    let current = 0;
    let activeTab = 'home';

    function svg(name) {
      const icons = {
        logo: `<svg viewBox="0 0 40 40">
          <path d="M20 36C28 36 34 30 34 22C34 14 20 6 20 6C20 6 6 14 6 22C6 30 12 36 20 36Z" fill="#E03E3E"/>
          <path d="M20 2V8" stroke="#2ECC71" stroke-width="4" stroke-linecap="round"/>
        </svg>`,
        search: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>',
        plus: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>',
        settings: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>',
        heart: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
        heartFill: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
        arrow: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
      };
      return icons[name] || '';
    }

    function toggleFav(id, e) {
      e.stopPropagation();
      const w = W.find(x => x.id === id);
      w.fav = !w.fav;
      render();
    }

    function selectWallpaper(idx) {
      current = idx;
      render();
    }

    function render() {
      const c = W[current];
      const favs = W.filter(w => w.fav);
      document.getElementById('app').innerHTML = activeTab === 'home' ? renderHome(c, favs) : renderLibrary();
    }

    function renderHome(c, favs) {
      return `
        <div class="hero-section">
          <div class="hero-bg"><img src="${c.img}" alt="" key="${c.id}"></div>
          <div class="topbar">
            <div class="branding" onclick="activeTab='home';render()">
              <div class="logo-container">${svg('logo')}</div>
              <div class="brand-text">
                <span class="brand-plum">Plum</span>
                <span class="brand-wallpaper">WallPaper</span>
              </div>
            </div>
            <div class="nav-tabs">
              <div class="nav-tab active">首页</div>
              <div class="nav-tab" onclick="activeTab='library';render()">壁纸馆</div>
            </div>
            <div class="topbar-actions">
              <button class="topbar-btn" title="搜索">${svg('search')}</button>
              <button class="topbar-btn" title="导入">${svg('plus')}</button>
              <button class="topbar-btn" title="设置">${svg('settings')}</button>
            </div>
          </div>
          <div class="hero-content">
            <div class="hero-label">当前呈现 · Now Playing</div>
            <div class="hero-title">${c.name}</div>
            <div class="hero-actions">
              <button class="btn-primary" onclick="alert('已应用: ${c.name}')">设为壁纸</button>
              <button class="btn-icon ${c.fav?'favorited':''}" onclick="toggleFav(${c.id}, event)">${svg(c.fav?'heartFill':'heart')}</button>
            </div>
          </div>
          <div class="thumb-strip">
            ${W.map((w, i) => `<div class="thumb-item ${i===current?'active':''}" onclick="selectWallpaper(${i})"><img src="${w.img}"></div>`).join('')}
          </div>
        </div>
        <div class="content-area">
          <div class="content-section">
            <div class="section-header">
              <div class="section-title">精选新作</div>
            </div>
            <div class="section-scroll">
              ${W.map(w => cardHTML(w)).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderLibrary() {
      return `
        <div class="topbar" style="position:sticky;top:0;background:var(--glass-thick);backdrop-filter:blur(50px);z-index:100;border-bottom:1px solid var(--glass-border);">
          <div class="branding" onclick="activeTab='home';render()">
            <div class="logo-container">${svg('logo')}</div>
            <div class="brand-text">
              <span class="brand-plum">Plum</span>
              <span class="brand-wallpaper">WallPaper</span>
            </div>
          </div>
          <div class="nav-tabs">
            <div class="nav-tab" onclick="activeTab='home';render()">首页</div>
            <div class="nav-tab active">壁纸馆</div>
          </div>
        </div>
        <div style="padding:60px 56px; background:var(--bg); min-height:100vh;">
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:40px;">
            ${W.map(w => cardHTML(w)).join('')}
          </div>
        </div>
      `;
    }

    function cardHTML(w) {
      const idx = W.indexOf(w);
      return `
        <div class="wallpaper-card" onclick="selectWallpaper(${idx});activeTab='home';render()">
          <div class="card-thumb">
            <img src="${w.img}">
            ${w.isNew ? '<div class="card-badge">NEW</div>' : ''}
            <div class="card-fav ${w.fav?'favorited':''}" onclick="toggleFav(${w.id}, event)">${svg(w.fav?'heartFill':'heart')}</div>
          </div>
          <div class="card-name">${w.name}</div>
          <div class="card-meta">${w.tag} · ${w.res}</div>
        </div>
      `;
    }

    render();
  </script>
</body>
