<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlumWallPaper 色彩实验室 - Jewel Final</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0b0e;
      --fg: #ffffff;
      --accent: #E03E3E;
      --jewel-green: #2ECC71;
      --glass: rgba(26, 29, 35, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-main: 'Cormorant Garamond', serif;
      /* 初始滤镜值 */
      --sat: 1; --bri: 1; --blu: 0px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    html, body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .lab-container { width: 100vw; height: 100vh; position: relative; }

    /* 背景预览 - 支持长按对比 */
    .preview-bg { 
      position: absolute; inset: 0; z-index: 0; cursor: pointer;
      transition: filter 0.3s ease;
    }
    .preview-bg img { 
      width: 100%; height: 100%; object-fit: cover; 
      filter: saturate(var(--sat)) brightness(var(--bri)) blur(var(--blu));
      transition: filter 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .preview-bg.comparing img { filter: none !important; }

    .compare-hint {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
      padding: 8px 20px; border-radius: 100px; font-size: 14px; color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
      z-index: 5;
    }

    /* ===== 顶部品牌区 ===== */
    .lab-header {
      position: absolute; top: 48px; left: 56px; z-index: 10;
      display: flex; align-items: center; gap: 16px;
    }
    .logo-container {
      width: 48px; height: 48px; background: #16181c; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.05);
    }
    .logo-container svg { width: 32px; height: 32px; }
    .lab-title-group { display: flex; flex-direction: column; }
    .lab-subtitle { font-size: 12px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--accent); margin-bottom: 2px; font-weight: 600; }
    .lab-title { font-size: 36px; font-weight: 500; font-style: italic; color: #fff; }

    .close-btn {
      position: absolute; top: 48px; right: 56px; width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.25); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: 50%;
      cursor: pointer; color: #fff; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20;
    }
    .close-btn:hover { background: var(--accent); transform: rotate(90deg) scale(1.1); border-color: var(--accent); }

    /* ===== 调节面板 ===== */
    .adjustment-panel {
      position: absolute; right: 48px; top: 120px; bottom: 48px; width: 400px;
      background: var(--glass); backdrop-filter: blur(100px) saturate(160%);
      border: 1px solid var(--glass-border); border-radius: 36px;
      padding: 48px; display: flex; flex-direction: column; gap: 48px; z-index: 10;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    }

    .panel-section-title { font-size: 22px; font-style: italic; color: rgba(255,255,255,0.9); margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 10px; }

    .slider-group { display: flex; flex-direction: column; gap: 18px; margin-bottom: 28px; }
    .slider-info { display: flex; justify-content: space-between; align-items: baseline; }
    .slider-label { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.35); }
    .slider-value { font-size: 15px; color: #fff; font-family: 'Inter', sans-serif; font-weight: 300; opacity: 0.6; }

    .slider { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; outline: none; cursor: pointer; }
    .slider::-webkit-slider-thumb { 
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; 
      transition: all 0.3s; box-shadow: 0 0 15px rgba(255,255,255,0.4); 
    }
    .slider::-webkit-slider-thumb:hover { transform: scale(1.4); background: var(--accent); box-shadow: 0 0 20px var(--accent); }

    .presets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .preset-card { 
      aspect-ratio: 1.3; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); 
      border-radius: 14px; display: flex; align-items: center; justify-content: center; 
      font-size: 14px; color: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s; 
    }
    .preset-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); color: #fff; }
    .preset-card.active { border-color: var(--accent); color: var(--accent); background: rgba(224, 62, 62, 0.08); font-weight: 600; }

    .action-row { margin-top: auto; display: flex; gap: 16px; }
    .btn-secondary { flex: 1; padding: 16px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 16px; color: rgba(255,255,255,0.5); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-primary { flex: 1.8; padding: 16px; background: #fff; border: none; border-radius: 16px; color: #000; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
    .btn-primary:hover { background: var(--accent); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(224, 62, 62, 0.4); }
  </style>
</head>
<body>
  <div class="lab-container">
    <div class="preview-bg" id="previewArea" title="长按对比原图">
      <img id="previewImg" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNjAwIDkwMCI+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJzIiB4MT0iMCIgeTE9IjAiIHgyPSIwIiB5Mj0iMSI+PHN0b3Agb2Zmc2V0PSIwJSIgc3RvcC1jb2xvcj0iI0ZGNkIzNSIvPjxzdG9wIG9mZnNldD0iNDAlIiBzdG9wLWNvbG9yPSIjRkZBNTAwIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjRkZENzAwIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHJlY3QgZmlsbD0idXJsKCNzKSIgd2lkdGg9IjE2MDAiIGhlaWdodD0iOTAwIi8+PHBhdGggZmlsbD0iIzAwMCIgb3BhY2l0eT0iLjUiIGQ9Ik0wIDYwMCBRNDAwIDU1MCA4MDAgNjAwIFQxNjAwIDU4MCBMMTYwMCA5MDAgTDAgOTAwWiIvPjwvc3ZnPg==">
    </div>

    <div class="compare-hint">长按屏幕对比原图</div>

    <header class="lab-header">
      <div class="logo-container">
        <svg viewBox="0 0 40 40">
          <path d="M20 36C28 36 34 30 34 22C34 14 20 6 20 6C20 6 6 14 6 22C6 30 12 36 20 36Z" fill="#E03E3E"/>
          <path d="M20 2V8" stroke="#2ECC71" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="lab-title-group">
        <div class="lab-subtitle">Visual Lab</div>
        <h1 class="lab-title">色彩实验室</h1>
      </div>
    </header>

    <button class="close-btn" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <div class="adjustment-panel">
      <section>
        <h2 class="panel-section-title">光影质感</h2>
        <div class="slider-group">
          <div class="slider-info"><span class="slider-label">光感 · Brightness</span><span class="slider-value" id="val-bri">100%</span></div>
          <input type="range" class="slider" id="input-bri" min="0" max="200" value="100" oninput="update('bri', this.value)">
        </div>
        <div class="slider-group">
          <div class="slider-info"><span class="slider-label">色华 · Saturation</span><span class="slider-value" id="val-sat">100%</span></div>
          <input type="range" class="slider" id="input-sat" min="0" max="200" value="100" oninput="update('sat', this.value)">
        </div>
        <div class="slider-group">
          <div class="slider-info"><span class="slider-label">迷雾 · Blur</span><span class="slider-value" id="val-blu">0px</span></div>
          <input type="range" class="slider" id="input-blu" min="0" max="40" value="0" oninput="update('blu', this.value)">
        </div>
      </section>

      <section>
        <h2 class="panel-section-title">艺术预设</h2>
        <div class="presets-grid">
          <div class="preset-card active" onclick="setPreset(1,1,0)">原始</div>
          <div class="preset-card" onclick="setPreset(0.4, 1.2, 0)">冷调</div>
          <div class="preset-card" onclick="setPreset(1.1, 0.8, 2)">胶片</div>
          <div class="preset-card" onclick="setPreset(1.3, 1.1, 0)">晨曦</div>
          <div class="preset-card" onclick="setPreset(0.8, 1.8, 0)">赛博</div>
          <div class="preset-card" onclick="setPreset(0, 1.1, 4)">墨染</div>
        </div>
      </section>

      <div class="action-row">
        <button class="btn-secondary" onclick="reset()">重置</button>
        <button class="btn-primary" onclick="alert('配置已应用至全站壁纸')">应用更改</button>
      </div>
    </div>
  </div>

  <script>
    function update(type, val) {
      const unit = type === 'blu' ? 'px' : '';
      const displayUnit = type === 'blu' ? 'px' : '%';
      
      document.getElementById('val-' + type).innerText = val + displayUnit;
      
      const factor = type === 'blu' ? 1 : 0.01;
      document.documentElement.style.setProperty('--' + type, val * factor + unit);
    }

    function setPreset(sat, bri, blu) {
      document.querySelectorAll('.preset-card').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('input-sat').value = sat * 100;
      document.getElementById('input-bri').value = bri * 100;
      document.getElementById('input-blu').value = blu;
      
      update('sat', sat * 100);
      update('bri', bri * 100);
      update('blu', blu);
    }

    function reset() {
      setPreset(1, 1, 0);
      document.querySelector('.preset-card:first-child').classList.add('active');
    }

    // 对比逻辑
    const preview = document.getElementById('previewArea');
    const startCompare = () => preview.classList.add('comparing');
    const endCompare = () => preview.classList.remove('comparing');

    preview.addEventListener('mousedown', startCompare);
    window.addEventListener('mouseup', endCompare);
    preview.addEventListener('touchstart', startCompare);
    window.addEventListener('touchend', endCompare);
  </script>
</body>
</html>
