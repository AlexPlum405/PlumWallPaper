<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>色彩设置页 - 悬浮极简风格探索</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&display=swap');
    
    :root {
      --accent: #E03E3E;
      --font-display: 'Cormorant Garamond', serif;
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
      overflow: hidden; 
      background: #1C1C1E; /* 基础深灰背景 */
    }
    
    /* 隐藏所有面板的默认滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Input Range 极致悬浮样式 (基于 demo-4) */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      height: 24px; 
    }
    input[type=range]:focus { outline: none; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 12px; width: 12px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      margin-top: -5px;
      /* 增强控件的阴影保证可见性 */
      box-shadow: 0 1px 4px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.3);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%; height: 2px;
      cursor: pointer;
      background: rgba(255,255,255,0.3);
      border-radius: 1px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    
    /* 所有悬浮文字必须带极其细微的黑边阴影，以防被亮色壁纸吞没 */
    .floating-text {
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6), 0 1px 8px rgba(0,0,0,0.4);
    }

    /* 悬浮按钮样式 */
    .btn-float { 
      display: inline-flex; 
      align-items: center; 
      justify-content: center;
      gap: 8px; 
      padding: 8px 16px; 
      border-radius: 8px; 
      border: 1px solid rgba(255,255,255,0.3); 
      background: transparent; 
      color: #fff; 
      cursor: pointer; 
      font-size: 13px; 
      font-weight: 600;
      transition: 0.2s; 
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .btn-float:hover { background: rgba(255,255,255,0.1); }
    .btn-primary-float { 
      background: var(--accent); 
      border-color: var(--accent); 
      box-shadow: 0 2px 8px rgba(224, 62, 62, 0.4);
    }
    .btn-primary-float:hover { background: #ff4d4d; }

    /* Tab 切换栏 */
    .tabs { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
      z-index: 1000; display: flex; gap: 8px; 
      background: rgba(0,0,0,0.6); padding: 6px; border-radius: 12px; backdrop-filter: blur(20px); 
    }
    .tab-btn { 
      padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; 
      color: rgba(255,255,255,0.6); cursor: pointer; border: none; background: transparent; 
    }
    .tab-btn.active { background: rgba(255,255,255,0.15); color: #fff; }

    /* 方案一：左侧对齐的浮动面板 */
    .panel-v1 {
      position: absolute; top: 0; left: 0; bottom: 0; width: 400px;
      padding: 64px 48px; background: transparent; overflow-y: auto;
    }
    
    /* 方案二：右侧对齐的浮动面板 */
    .panel-v2 {
      position: absolute; top: 0; right: 0; bottom: 0; width: 360px;
      padding: 48px 32px; background: transparent; overflow-y: auto;
    }

    /* 方案三：底部悬浮工具栏 (横向布局) */
    .panel-v3 {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 1000px; background: transparent; display: flex; gap: 40px;
    }

    .slider-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
    .slider-value { font-family: monospace; opacity: 0.8; font-size: 11px; }

    .section-title { font-size: 11px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 24px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const Icon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ filter: 'drop-shadow(0 1px 2px rgba(0,0,0,0.5))' }}><path d="M18 6L6 18M6 6l12 12"/></svg>;

    // 核心滑块组件，强绑定 floating-text
    const Slider = ({ label, val, set, min, max, unit = '' }) => (
      <div className="slider-container floating-text">
        <div className="slider-header">
          <span>{label}</span>
          <span className="slider-value">{val}{unit}</span>
        </div>
        <input type="range" min={min} max={max} value={val} onChange={e => set(e.target.value)} />
      </div>
    );

    const ColorPage = ({ variant }) => {
      // 提取 v5 所有状态
      const [hue, setHue] = useState(0);
      const [sat, setSat] = useState(100);
      const [bri, setBri] = useState(100);
      const [con, setCon] = useState(100);
      const [blur, setBlur] = useState(0);
      const [gray, setGray] = useState(0);
      const [inv, setInv] = useState(0);
      const [expo, setExpo] = useState(100);
      const [grain, setGrain] = useState(0);
      const [vignette, setVignette] = useState(0);

      const filterString = `hue-rotate(${hue}deg) saturate(${sat}%) brightness(${bri}%) contrast(${con}%) blur(${blur}px) grayscale(${gray}%) invert(${inv}%) brightness(${expo}%)`;

      const reset = () => {
        setHue(0); setSat(100); setBri(100); setCon(100); setBlur(0);
        setGray(0); setInv(0); setExpo(100); setGrain(0); setVignette(0);
      };

      // 渲染面板内容
      const renderContent = (isHorizontal = false) => (
        <React.Fragment>
          {!isHorizontal && (
            <div className="floating-text" style={{ marginBottom: 40 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
                <span style={{ padding: '2px 8px', background: 'var(--accent)', borderRadius: 4, fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.05em', color: '#fff', boxShadow: '0 2px 4px rgba(0,0,0,0.3)' }}>4K / NATURE</span>
              </div>
              <h2 style={{ fontSize: 32, fontFamily: 'var(--font-display)', fontStyle: 'italic', marginBottom: 8, lineHeight: 1.1 }}>Neon Genesis</h2>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 700, opacity: 0.7 }}>Color Grading Studio</div>
            </div>
          )}

          <div style={isHorizontal ? { flex: 1 } : { marginBottom: 32 }}>
            <div className="section-title floating-text">基础校正 / Basic</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <Slider label="曝光度" val={expo} set={setExpo} min={0} max={200} />
              <Slider label="对比度" val={con} set={setCon} min={50} max={150} />
              <Slider label="饱和度" val={sat} set={setSat} min={0} max={200} />
              <Slider label="色调" val={hue} set={setHue} min={-180} max={180} />
            </div>
          </div>

          <div style={isHorizontal ? { flex: 1 } : { marginBottom: 32 }}>
            <div className="section-title floating-text">艺术效果 / Artistic</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <Slider label="模糊" val={blur} set={setBlur} min={0} max={20} unit="px" />
              <Slider label="颗粒感" val={grain} set={setGrain} min={0} max={100} />
              <Slider label="暗角" val={vignette} set={setVignette} min={0} max={100} />
            </div>
          </div>

          <div style={isHorizontal ? { flex: 1 } : { marginBottom: 32 }}>
            <div className="section-title floating-text">风格转换 / Filters</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <Slider label="灰度" val={gray} set={setGray} min={0} max={100} />
              <Slider label="反转" val={inv} set={setInv} min={0} max={100} />
            </div>
          </div>

          <div style={isHorizontal ? { flex: 1.2, borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 40 } : { marginTop: 24, paddingTop: 32, borderTop: '1px solid rgba(255,255,255,0.2)' }}>
            <div className="floating-text" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700 }}>常用预设</div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 24 }}>
              {[
                { n: '胶片', h: 0, s: 80, b: 90, c: 110, bl: 0, g: 10, i: 0, e: 105, gr: 15, v: 20 },
                { n: '冷色', h: 10, s: 70, b: 105, c: 105, bl: 0, g: 0, i: 0, e: 100, gr: 0, v: 10 },
                { n: '黑白', h: 0, s: 0, b: 100, c: 120, bl: 0, g: 100, i: 0, e: 110, gr: 20, v: 40 },
                { n: '通透', h: 0, s: 120, b: 110, c: 115, bl: 0, g: 0, i: 0, e: 115, gr: 0, v: 0 },
                { n: '梦幻', h: -10, s: 130, b: 105, c: 90, bl: 8, g: 0, i: 0, e: 110, gr: 0, v: 15 },
                { n: '深夜', h: 20, s: 60, b: 70, c: 130, bl: 2, g: 0, i: 0, e: 80, gr: 5, v: 60 }
              ].map(p => (
                <button
                  key={p.n}
                  className="btn-float"
                  style={{ fontSize: 11, padding: '8px' }}
                  onClick={() => {
                    setHue(p.h); setSat(p.s); setBri(p.b); setCon(p.c);
                    setBlur(p.bl); setGray(p.g); setInv(p.i); setExpo(p.e);
                    setGrain(p.gr); setVignette(p.v);
                  }}
                >
                  {p.n}
                </button>
              ))}
            </div>

            <div style={{ display: 'flex', gap: 12 }}>
              <button className="btn-float btn-primary-float" style={{ flex: 1.5, height: 40 }}>应用更改</button>
              <button className="btn-float" style={{ flex: 1, height: 40 }} onClick={reset}>重置</button>
            </div>
          </div>
        </React.Fragment>
      );

      return (
        <div style={{ height: '100vh', position: 'relative', overflow: 'hidden', background: '#1C1C1E' }}>
          {/* 背景层：全屏壁纸 */}
          <div style={{ position: 'absolute', inset: 0 }}>
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" style={{ width: '100%', height: '100%', objectFit: 'cover', filter: filterString }} />
            {/* 暗角与颗粒感依然在底层，不会影响悬浮 UI */}
            <div style={{ position: 'absolute', inset: 0, background: `radial-gradient(circle, transparent ${100 - vignette}%, rgba(0,0,0,${vignette/100}))`, pointerEvents: 'none' }} />
            {grain > 0 && (
              <div style={{ position: 'absolute', inset: 0, opacity: grain / 100, pointerEvents: 'none', backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")` }} />
            )}
          </div>

          <div style={{ position: 'absolute', top: 32, right: variant === 'v1' ? 32 : 'auto', left: variant === 'v1' ? 'auto' : 32, zIndex: 100 }}>
            <button className="btn-float" style={{ borderRadius: '50%', width: 44, height: 44, padding: 0 }}><Icon /></button>
          </div>

          {/* 纯粹悬浮的透明面板 */}
          {variant === 'v1' && (
            <div className="panel-v1 no-scrollbar">
              {renderContent(false)}
            </div>
          )}

          {variant === 'v2' && (
            <div className="panel-v2 no-scrollbar">
              {renderContent(false)}
            </div>
          )}

          {variant === 'v3' && (
            <div className="panel-v3">
              {renderContent(true)}
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [variant, setVariant] = useState('v2');
      
      return (
        <div>
          <div className="tabs">
            <button className={`tab-btn ${variant === 'v1' ? 'active' : ''}`} onClick={() => setVariant('v1')}>设计 1: 左侧宽轴悬浮</button>
            <button className={`tab-btn ${variant === 'v2' ? 'active' : ''}`} onClick={() => setVariant('v2')}>设计 2: 右侧原生悬浮</button>
            <button className={`tab-btn ${variant === 'v3' ? 'active' : ''}`} onClick={() => setVariant('v3')}>设计 3: 底部控制台</button>
          </div>
          <ColorPage key={variant} variant={variant} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
