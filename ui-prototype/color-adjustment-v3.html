<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlumWallPaper - 色彩调节</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0e10;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    .preview-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .preview-area {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0e10;
    }

    .preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.3s ease;
    }

    .wallpaper-info {
      position: absolute;
      top: 32px;
      left: 48px;
      z-index: 10;
    }

    .wallpaper-name {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .wallpaper-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: -0.01em;
    }

    .close-btn {
      position: absolute;
      top: 32px;
      right: 48px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
      z-index: 10;
    }

    .close-btn:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
    }

    /* 右侧浮动调节面板 - 空气感 */
    .adjustment-toolbar {
      position: absolute;
      right: 32px;
      top: 32px;
      bottom: 32px;
      width: 400px;
      background: rgba(26,29,35,0.75);
      backdrop-filter: blur(60px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.1) inset;
    }

    .adjustment-toolbar::-webkit-scrollbar { display: none; }
    .adjustment-toolbar { scrollbar-width: none; }

    .sliders-section {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-name {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.02em;
      font-weight: 500;
    }

    .slider-value {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .slider {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.1);
      outline: none;
      border-radius: 1px;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      transition: all 0.2s;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: #fff;
    }

    /* 预设 + 操作 */
    .bottom-row {
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 28px;
      margin-top: auto;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preset-btn {
      padding: 8px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.01em;
      border-radius: 8px;
      font-weight: 500;
    }

    .preset-btn:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
    }

    .preset-btn.active {
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.95);
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      padding: 9px 22px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.01em;
      border-radius: 9px;
      font-weight: 500;
    }

    .action-btn.secondary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }

    .action-btn.secondary:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
    }

    .action-btn.primary {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.95);
    }

    .action-btn.primary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.22);
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-area">
      <div class="wallpaper-info">
        <div class="wallpaper-name">日落海滩</div>
        <div class="wallpaper-meta">视频 · 0:15 · 1920×1080</div>
      </div>

      <button class="close-btn" onclick="closePreview()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>

      <img class="preview-image" id="previewImage"
        src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNjAwIDkwMCI+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJzIiB4MT0iMCIgeTE9IjAiIHgyPSIwIiB5Mj0iMSI+PHN0b3Agb2Zmc2V0PSIwJSIgc3RvcC1jb2xvcj0iI0ZGNkIzNSIvPjxzdG9wIG9mZnNldD0iNDAlIiBzdG9wLWNvbG9yPSIjRkZBNTAwIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjRkZENzAwIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHJlY3QgZmlsbD0idXJsKCNzKSIgd2lkdGg9IjE2MDAiIGhlaWdodD0iOTAwIi8+PGNpcmNsZSBmaWxsPSIjRkZGNUU2IiBjeD0iMTI4MCIgY3k9IjIwMCIgcj0iMTAwIi8+PGNpcmNsZSBmaWxsPSIjRkZCODREIiBvcGFjaXR5PSIuMyIgY3g9IjEyODAiIGN5PSIyMDAiIHI9IjE0MCIvPjxwYXRoIGZpbGw9IiMwMDAiIG9wYWNpdHk9Ii41IiBkPSJNMCA2MDAgUTQwMCA1NTAgODAwIDYwMCBUMTYwMCA1ODAgTDE2MDAgOTAwIEwwIDkwMFoiLz48ZWxsaXBzZSBmaWxsPSIjMWEwYTAwIiBvcGFjaXR5PSIuNiIgY3g9IjMwMCIgY3k9IjY1MCIgcng9IjYwIiByeT0iMTUwIi8+PGVsbGlwc2UgZmlsbD0iIzFhMGEwMCIgb3BhY2l0eT0iLjUiIGN4PSIxMjAwIiBjeT0iNjcwIiByeD0iNzAiIHJ5PSIxMzAiLz48L3N2Zz4=">
    </div>

    <div class="adjustment-toolbar">
      <div class="sliders-section">
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-name">色调</span>
            <span class="slider-value" id="hueVal">0°</span>
          </div>
          <input type="range" class="slider" id="hue" min="-180" max="180" value="0">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-name">饱和度</span>
            <span class="slider-value" id="satVal">1.00</span>
          </div>
          <input type="range" class="slider" id="sat" min="0" max="200" value="100">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-name">亮度</span>
            <span class="slider-value" id="briVal">0.00</span>
          </div>
          <input type="range" class="slider" id="bri" min="-100" max="100" value="0">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-name">对比度</span>
            <span class="slider-value" id="conVal">1.00</span>
          </div>
          <input type="range" class="slider" id="con" min="0" max="200" value="100">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-name">色温</span>
            <span class="slider-value" id="tmpVal">6500K</span>
          </div>
          <input type="range" class="slider" id="tmp" min="2000" max="10000" value="6500" step="100">
        </div>
      </div>

      <div class="bottom-row">
        <div class="presets">
          <button class="preset-btn" onclick="applyPreset('warm',this)">暖色</button>
          <button class="preset-btn" onclick="applyPreset('cool',this)">冷色</button>
          <button class="preset-btn" onclick="applyPreset('vintage',this)">复古</button>
          <button class="preset-btn" onclick="applyPreset('bw',this)">黑白</button>
          <button class="preset-btn" onclick="applyPreset('hc',this)">高对比</button>
          <button class="preset-btn" onclick="savePreset()">+ 保存</button>
        </div>
        <div class="actions">
          <button class="action-btn secondary" onclick="resetAll()">重置</button>
          <button class="action-btn secondary" onclick="closePreview()">取消</button>
          <button class="action-btn primary" onclick="apply()">应用</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const presets = {
      warm:    { hue:0, sat:115, bri:5, con:105, tmp:7500 },
      cool:    { hue:0, sat:110, bri:0, con:100, tmp:5000 },
      vintage: { hue:15, sat:80, bri:-10, con:120, tmp:6000 },
      bw:      { hue:0, sat:0, bri:0, con:115, tmp:6500 },
      hc:      { hue:0, sat:130, bri:0, con:140, tmp:6500 },
    };

    const ids = ['hue','sat','bri','con','tmp'];
    const valIds = ['hueVal','satVal','briVal','conVal','tmpVal'];

    function updateFilter() {
      const h = +document.getElementById('hue').value;
      const s = +document.getElementById('sat').value / 100;
      const b = +document.getElementById('bri').value / 100;
      const c = +document.getElementById('con').value / 100;
      const t = +document.getElementById('tmp').value;

      document.getElementById('hueVal').textContent = h + '°';
      document.getElementById('satVal').textContent = s.toFixed(2);
      document.getElementById('briVal').textContent = b.toFixed(2);
      document.getElementById('conVal').textContent = c.toFixed(2);
      document.getElementById('tmpVal').textContent = t + 'K';

      const tOff = (t - 6500) / 4500;
      const warmth = tOff > 0 ? `sepia(${tOff*0.3})` : `hue-rotate(${tOff*30}deg)`;

      document.getElementById('previewImage').style.filter =
        `hue-rotate(${h}deg) saturate(${s}) brightness(${1+b}) contrast(${c}) ${warmth}`;
    }

    ids.forEach(id => document.getElementById(id).addEventListener('input', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      updateFilter();
    }));

    function applyPreset(name, btn) {
      const p = presets[name];
      document.getElementById('hue').value = p.hue;
      document.getElementById('sat').value = p.sat;
      document.getElementById('bri').value = p.bri;
      document.getElementById('con').value = p.con;
      document.getElementById('tmp').value = p.tmp;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateFilter();
    }

    function resetAll() {
      document.getElementById('hue').value = 0;
      document.getElementById('sat').value = 100;
      document.getElementById('bri').value = 0;
      document.getElementById('con').value = 100;
      document.getElementById('tmp').value = 6500;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      updateFilter();
    }

    function savePreset() {
      const name = prompt('预设名称');
      if (name) alert(`已保存预设「${name}」`);
    }

    function apply() { alert('已应用色彩调节'); }
    function closePreview() { alert('返回壁纸库'); }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePreview();
      if (e.key === 'Enter' && e.metaKey) apply();
    });
  </script>
</body>
</html>
