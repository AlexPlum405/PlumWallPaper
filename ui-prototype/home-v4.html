<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlumWallPaper - 本地管理版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0e12;
      --fg: #ffffff;
      --accent: #E03E3E; 
      --jewel-green: #2ECC71;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --font-main: 'Cormorant Garamond', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    html { background: var(--bg); }
    body {
      font-family: var(--font-main);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto; /* 确保 body 可滚动 */
      user-select: none;
    }

    /* 隐藏滚动条 */
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    html, body { -ms-overflow-style: none; scrollbar-width: none; }

    .app { width: 100vw; position: relative; }

    /* ===== Hero Section (100vh) ===== */
    .hero-section {
      width: 100%;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-bg { position: absolute; inset: 0; z-index: 0; }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; animation: kenBurns 60s infinite alternate ease-in-out; }
    @keyframes kenBurns { from { transform: scale(1); } to { transform: scale(1.1); } }
    .hero-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(13,14,18,0) 40%, var(--bg) 100%); }

    /* ===== Topbar & Branding ===== */
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 100px; display: flex; align-items: center; padding: 0 56px; gap: 16px;
      z-index: 100;
    }

    .branding { display: flex; align-items: center; gap: 16px; cursor: pointer; }
    .logo-container {
      width: 48px; height: 48px; background: #16181c; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.05);
    }
    .logo-container svg { width: 32px; height: 32px; }
    .brand-text { display: flex; align-items: baseline; gap: 4px; }
    .brand-plum { font-size: 28px; font-weight: 700; color: #fff; }
    .brand-wallpaper { font-size: 28px; font-weight: 300; font-style: italic; color: rgba(255,255,255,0.35); }

    .nav-tabs { display: flex; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 4px; margin-left: 32px; }
    .nav-tab { padding: 6px 20px; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.4); cursor: pointer; border-radius: 10px; transition: 0.3s; }
    .nav-tab.active { background: rgba(255,255,255,0.08); color: #fff; }

    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .topbar-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); cursor: pointer; color: rgba(255,255,255,0.4); transition: 0.3s; }
    .topbar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-2px); }

    /* ===== Hero Content ===== */
    .hero-content { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 56px 64px; }
    .hero-label { font-size: 11px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .hero-title { font-size: 92px; font-weight: 500; letter-spacing: -0.02em; line-height: 0.95; font-style: italic; margin-bottom: 32px; }
    .hero-actions { display: flex; align-items: center; gap: 20px; }

    .btn-primary { padding: 16px 36px; background: #fff; border: none; border-radius: 100px; color: #000; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.4s; }
    .btn-primary:hover { background: var(--accent); color: #fff; transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 30px rgba(224, 62, 62, 0.4); }

    /* ===== Thumb Strip ===== */
    .thumb-strip { position: relative; z-index: 10; padding: 0 56px 56px; display: flex; gap: 16px; overflow-x: auto; }
    .thumb-item { flex-shrink: 0; width: 160px; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); transition: 0.4s; opacity: 0.3; cursor: pointer; }
    .thumb-item.active { border-color: var(--accent); opacity: 1; transform: scale(1.05) translateY(-4px); }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

    /* ===== Content Area ===== */
    .content-area { background: var(--bg); padding: 100px 56px 140px; position: relative; z-index: 5; }
    .section { margin-bottom: 80px; }
    .section-header { margin-bottom: 40px; }
    .section-title { font-size: 48px; font-weight: 400; font-style: italic; letter-spacing: -0.02em; }
    .section-desc { font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.2); margin-bottom: 12px; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 40px; }
    .card { cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
    .card:hover { transform: translateY(-12px); }
    .card-thumb { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 28px; overflow: hidden; border: 1px solid var(--glass-border); background: #1a1a1a; box-shadow: 0 20px 40px rgba(0,0,0,0.3); margin-bottom: 24px; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s ease; }
    .card:hover .card-thumb img { transform: scale(1.15); }
    .card-fav-btn { position: absolute; top: 18px; right: 18px; width: 40px; height: 40px; background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; color: #fff; }
    .card:hover .card-fav-btn { opacity: 1; }
    .card-fav-btn.active { opacity: 1; color: var(--accent); background: rgba(0,0,0,0.5); }
    .card-info h3 { font-size: 24px; font-style: italic; font-weight: 400; color: rgba(255,255,255,0.9); margin-bottom: 8px; }
    .card-info p { font-size: 13px; text-transform: uppercase; color: rgba(255,255,255,0.25); letter-spacing: 0.12em; }
  </style>
</head>

    <div class="content-area">

      <section class="section">
        <div class="section-header">
          <div class="section-desc">My Favorites</div>
          <h2 class="section-title">我的收藏</h2>
        </div>
        <div class="card-grid" id="favorites-grid"></div>
      </section>

      <!-- 最近上传 -->
      <section class="section">
        <div class="section-header">
          <div class="section-desc">Recently Imported</div>
          <h2 class="section-title">最近上传</h2>
        </div>
        <div class="card-grid" id="recent-grid"></div>
      </section>

      <!-- 本地目录 -->
      <section class="section">
        <div class="section-header">
          <div class="section-desc">Local Folders</div>
          <h2 class="section-title">本地目录</h2>
        </div>
        <div style="display:flex; gap:16px;">
          <button class="btn-primary" style="background:var(--glass); color:#fff; border:1px solid var(--glass-border);">📁 添加同步文件夹</button>

        </div>
      </section>
    </div>
  </div>

    let current = 0;

    function render() {
      const c = W[current];
      document.getElementById('hero-mount').innerHTML = `
        <div class="hero-section">
          <div class="hero-bg"><img src="${c.img}" key="${c.id}"></div>
          <div class="hero-content">
            <div class="hero-label">Jewel Curated · 正在预览</div>
            <h1 class="hero-title">${c.name}</h1>
            <div class="hero-actions">
              <button class="btn-primary" onclick="alert('已应用壁纸')">应用当前壁纸</button>
              <button class="topbar-btn" title="调色" onclick="location.href='color-adjustment-v4.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v10M12 17v4M7 8l-4 4 4 4M17 8l4 4-4 4"/></svg></button>
              <button class="topbar-btn ${c.fav?'active':''}" style="${c.fav?'color:var(--accent)':''}" onclick="toggleFav(${c.id})"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
            </div>
          </div>
          <div class="thumb-strip">
            ${W.map((w, i) => `<div class="thumb-item ${i===current?'active':''}" onclick="current=${i};render()"><img src="${w.img}"></div>`).join('')}
          </div>
        </div>
      `;

      document.getElementById('favorites-grid').innerHTML = W.filter(w => w.fav).map(w => cardHTML(w)).join('') || '<div style="opacity:0.2">暂无收藏壁纸</div>';
      document.getElementById('recent-grid').innerHTML = W.slice().reverse().map(w => cardHTML(w)).join('');
    }

    function toggleFav(id) {
      const w = W.find(x => x.id === id);
      w.fav = !w.fav;
      render();
    }

    function cardHTML(w) {
      return `
        <div class="card" onclick="current=${W.indexOf(w)};render();window.scrollTo({top:0,behavior:'smooth'})">
          <div class="card-thumb">
            <img src="${w.img}">
            <div class="card-fav-btn ${w.fav?'active':''}"><svg width="18" height="18" viewBox="0 0 24 24" fill="${w.fav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
          </div>
          <div class="card-info">
            <h3>${w.name}</h3>
            <p>${w.tag} · ${w.res}</p>
          </div>
        </div>
      `;
    }

    render();
  </script>
