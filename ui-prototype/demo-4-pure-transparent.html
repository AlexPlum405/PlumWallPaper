<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: white;
    /* 基础背景色：深灰 */
    background: #1C1C1E; 
    overflow: hidden;
  }
  
  /* 壁纸全屏铺满，没有外层边框或阴影 */
  .wallpaper-preview {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
  }
  
  /* 极简设置栏：完全透明，直接悬浮，没有任何特效、边框、阴影或背景色 */
  .settings-panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 320px;
    background: transparent; /* 完全透明 */
    padding: 64px 32px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .control-group { display: flex; flex-direction: column; gap: 12px; }
  .label { font-size: 12px; letter-spacing: 0.1em; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
  
  /* 极简控件 */
  .slider-track { height: 2px; background: rgba(255,255,255,0.3); position: relative; }
  .slider-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 60%; background: white; }
  .slider-thumb { position: absolute; left: 60%; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: white; }
</style>
</head>
<body>
  <div class="wallpaper-preview"></div>
  
  <div class="settings-panel">
    <div class="control-group">
      <div class="label">EXPOSURE</div>
      <div class="slider-track"><div class="slider-fill"></div><div class="slider-thumb"></div></div>
    </div>
    
    <div class="control-group">
      <div class="label">CONTRAST</div>
      <div class="slider-track"><div class="slider-fill" style="width:80%"></div><div class="slider-thumb" style="left:80%"></div></div>
    </div>

    <div class="control-group">
      <div class="label">SATURATION</div>
      <div class="slider-track"><div class="slider-fill" style="width:40%"></div><div class="slider-thumb" style="left:40%"></div></div>
    </div>
  </div>
</body>
</html>
