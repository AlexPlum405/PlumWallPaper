<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1024px;
      height: 1024px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-container {
      width: 1024px;
      height: 1024px;
      background: #16181c;
      border-radius: 224px; /* macOS 标准圆角比例 */
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 50px 100px rgba(0,0,0,0.5);
      position: relative;
      border: 10px solid rgba(255,255,255,0.1);
    }
    svg {
      width: 700px;
      height: 700px;
    }
  </style>
</head>
<body>
  <div class="icon-container">
    <svg viewBox="0 0 40 40">
      <defs>
        <radialGradient id="plumGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
          <stop offset="0%" stop-color="#ff4d4d" />
          <stop offset="100%" stop-color="#E03E3E" />
        </radialGradient>
      </defs>
      <path d="M20 36C28 36 34 30 34 22C34 14 20 6 20 6C20 6 6 14 6 22C6 30 12 36 20 36Z" fill="url(#plumGrad)"/>
      <path d="M20 2V8" stroke="#2ECC71" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
</body>
</html>
